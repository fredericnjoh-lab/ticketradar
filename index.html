<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- CSP géré par GitHub Pages -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TicketRadar — Resale Intelligence v5</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4A843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TicketRadar">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- App styles -->
  <link rel="stylesheet" href="./styles.v6.css">
</head>
<body>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══ SHELL ══ -->
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-mark">TR</div>
      <div>
        <div class="sb-logo-name">TicketRadar</div>
        <div class="sb-logo-tag">v6 · predictive AI</div>
      </div>
    </div>

    <div class="sb-section-lbl">NAVIGATION</div>
    <div class="sb-item active" id="nav-dash" onclick="nav('dash',this)"><span class="sb-item-dot"></span> Dashboard</div>
    <div class="sb-item" id="nav-events" onclick="nav('events',this)"><span class="sb-item-dot"></span> Events</div>
    <div class="sb-item" id="nav-kanban" onclick="nav('kanban',this)"><span class="sb-item-dot"></span> Kanban P&amp;L</div>
    <div class="sb-item" id="nav-presale" onclick="nav('presale',this)"><span class="sb-item-dot"></span> Presale</div>

    <div class="sb-section-lbl">INTELLIGENCE</div>
    <div class="sb-item" id="nav-ai" onclick="nav('ai',this)"><span class="sb-item-dot" style="background:var(--purple)"></span> AI Predictor</div>
    <div class="sb-item" id="nav-history" onclick="nav('history',this)"><span class="sb-item-dot" style="background:var(--blue)"></span> Price History</div>
    <div class="sb-item" id="nav-map" onclick="nav('map',this)"><span class="sb-item-dot" style="background:var(--teal)"></span> Map</div>

    <div class="sb-section-lbl">OUTILS</div>
    <div class="sb-item" id="nav-wl" onclick="nav('wl',this)"><span class="sb-item-dot"></span> Watchlist</div>
    <div class="sb-item" id="nav-compare" onclick="nav('compare',this)"><span class="sb-item-dot"></span> Comparer</div>
    <div class="sb-item" id="nav-roi" onclick="nav('roi',this)"><span class="sb-item-dot"></span> ROI Calc</div>
    <div class="sb-item" id="nav-settings" onclick="nav('settings',this)"><span class="sb-item-dot"></span> Config ⚙</div>

    <div class="sb-bottom">
      <div class="sb-user" onclick="toggleUserMenu()">
        <div class="sb-avatar" id="user-btn">👤</div>
        <div>
          <div class="sb-uname" id="user-email-sb">Mon compte</div>
          <div class="sb-ustatus" id="user-status-sb">● local</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-kpis">
        <div class="tb-kpi">
          <div class="tb-kpi-lbl">LIVE SCANS</div>
          <div class="tb-kpi-val" id="tb-scans">—</div>
        </div>
        <div class="tb-kpi">
          <div class="tb-kpi-lbl">OPPORTUNITIES</div>
          <div class="tb-kpi-val" id="tb-opps">—</div>
        </div>
        <div class="tb-kpi">
          <div class="tb-kpi-lbl">AVG ROI</div>
          <div class="tb-kpi-val" id="tb-roi" style="color:var(--teal)">—</div>
        </div>
      </div>
      <div class="topbar-search">
        <svg width="12" height="12" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5" fill="none" stroke="var(--t3)" stroke-width="1.5"/><line x1="11" y1="11" x2="15" y2="15" stroke="var(--t3)" stroke-width="1.5"/></svg>
        <input placeholder="Search events..." id="global-search" oninput="globalSearch(this.value)">
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="Thème">☀</button>
        <div class="notif-btn" id="notif-btn" title="Alertes">
          🔔
          <div class="notif-count" id="notif-count" style="display:none">0</div>
        </div>
        <button class="scan-btn" id="scan-btn" onclick="runScan()">
          <span id="scan-ic">⟳</span> <span id="scan-lbl">Scanner</span>
        </button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content"></div>

  </div>
</div>


</html>
