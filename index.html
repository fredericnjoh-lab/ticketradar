<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketRadar — Resale Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    /* ── RESET & VARIABLES ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080e; --bg2: #0f0f18; --bg3: #16161f; --bg4: #1c1c28; --bg5: #222232; --bg6: #2a2a40;
      --border: #25253a; --border2: #35355a; --border3: #45456a;
      --text: #f0f0f8; --text2: #9898b8; --text3: #55556a; --text4: #38384a;
      --accent: #6c63ff; --accent2: #8b84ff; --accent3: #aba4ff; --accentbg: rgba(108,99,255,.12);
      --green: #22d3a0; --greenbg: rgba(34,211,160,.1); --greenbdr: rgba(34,211,160,.25);
      --amber: #f4a836; --amberbg: rgba(244,168,54,.1); --amberbdr: rgba(244,168,54,.25);
      --red: #f06060; --redbg: rgba(240,96,96,.1); --redbdr: rgba(240,96,96,.25);
      --blue: #60a8f0; --bluebg: rgba(96,168,240,.1);
      --purple: #c084fc; --purplebg: rgba(192,132,252,.1);
      --mono: 'JetBrains Mono', monospace;
      --head: 'Space Grotesk', sans-serif;
      --r6: 6px; --r10: 10px; --r14: 14px; --r20: 20px;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--head); font-size: 13px; line-height: 1.5; }
    a { color: var(--accent3); text-decoration: none; }
    input, select, button { font-family: var(--head); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── TOPBAR ────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px; height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,14,.97);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-mark {
      width: 32px; height: 32px; background: var(--accent);
      border-radius: var(--r10); display: flex; align-items: center;
      justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .logo-name { font-size: 15px; font-weight: 700; letter-spacing: -.03em; }
    .logo-tag { font-size: 9.5px; color: var(--text3); font-family: var(--mono); }
    .topbar-center { flex: 1; display: flex; justify-content: center; }
    .nav-pills {
      display: flex; gap: 2px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r10); padding: 3px;
    }
    .npill {
      padding: 5px 13px; border-radius: var(--r6); font-size: 11.5px; font-weight: 500;
      cursor: pointer; color: var(--text2); border: none; background: transparent;
      transition: all .15s; white-space: nowrap;
    }
    .npill:hover { color: var(--text); }
    .npill.active { background: var(--bg5); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .lang-toggle { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r6); overflow: hidden; }
    .lang-btn { padding: 5px 10px; font-size: 10.5px; font-weight: 600; cursor: pointer; color: var(--text3); border: none; background: transparent; transition: all .15s; font-family: var(--mono); }
    .lang-btn.active { background: var(--accent); color: #fff; }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; position: relative; }
    .pulse::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 1px solid var(--green); animation: ping 2s ease-out infinite; opacity: 0; }
    @keyframes ping { 0% { transform: scale(.8); opacity: .8; } 100% { transform: scale(2); opacity: 0; } }
    #status-lbl { font-size: 10.5px; color: var(--text3); font-family: var(--mono); }
    .scan-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r10);
      background: var(--accent); border: none; color: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .scan-btn:hover { background: var(--accent2); }
    .scan-btn.loading { opacity: .6; pointer-events: none; }
    .spin { display: inline-block; }
    .scan-btn.loading .spin { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LAYOUT ────────────────────────────────────────── */
    .shell { display: flex; min-height: calc(100vh - 56px); }
    .sidebar {
      width: 210px; border-right: 1px solid var(--border);
      padding: 16px 10px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 20px;
      position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto;
    }
    .content { flex: 1; padding: 20px; overflow-y: auto; }

    /* ── SIDEBAR ───────────────────────────────────────── */
    .sb-lbl { font-size: 9px; font-weight: 600; letter-spacing: .1em; color: var(--text4); padding: 0 8px; margin-bottom: 4px; font-family: var(--mono); }
    .sb-mkt { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-radius: var(--r6); cursor: pointer; transition: background .1s; }
    .sb-mkt:hover { background: var(--bg3); }
    .sb-mkt-label { font-size: 11.5px; color: var(--text2); }
    .sb-mkt.on .sb-mkt-label { color: var(--text); }
    .tog { width: 28px; height: 15px; border-radius: 8px; background: var(--border2); position: relative; transition: background .2s; flex-shrink: 0; }
    .tog.on { background: var(--accent); }
    .tog::after { content: ''; position: absolute; top: 2px; left: 2px; width: 11px; height: 11px; border-radius: 50%; background: #fff; transition: left .18s; }
    .tog.on::after { left: 15px; }
    .seuil-wrap { padding: 0 8px; }
    .seuil-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    #seuil-val { font-size: 11.5px; font-family: var(--mono); color: var(--accent3); }
    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    /* ── KPI CARDS ─────────────────────────────────────── */
    .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
    .kpi-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r14); padding: 14px 16px;
      position: relative; overflow: hidden; transition: border-color .2s;
    }
    .kpi-card:hover { border-color: var(--border2); }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .kc-green::before { background: var(--green); }
    .kc-accent::before { background: var(--accent); }
    .kc-amber::before { background: var(--amber); }
    .kc-blue::before { background: var(--blue); }
    .kc-purple::before { background: var(--purple); }
    .kpi-lbl { font-size: 9.5px; font-weight: 500; letter-spacing: .05em; color: var(--text3); margin-bottom: 8px; font-family: var(--mono); }
    .kpi-val { font-size: 24px; font-weight: 700; font-family: var(--mono); line-height: 1; }
    .kpi-sub { font-size: 9.5px; color: var(--text3); margin-top: 5px; }
    .kpi-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; margin-top: 6px; }
    .kb-up { background: var(--greenbg); color: var(--green); border: 1px solid var(--greenbdr); }
    .kb-warn { background: var(--amberbg); color: var(--amber); border: 1px solid var(--amberbdr); }

    /* ── CARD ──────────────────────────────────────────── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r20); overflow: hidden; margin-bottom: 16px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 13px; font-weight: 600; }
    .card-meta { font-size: 10.5px; color: var(--text3); font-family: var(--mono); }
    .card-act { font-size: 11px; color: var(--accent3); cursor: pointer; font-weight: 500; }
    .card-act:hover { color: var(--accent2); }

    /* ── TOOLBAR ───────────────────────────────────────── */
    .toolbar { display: flex; align-items: center; gap: 6px; padding: 10px 18px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .fchip { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; transition: all .12s; white-space: nowrap; }
    .fchip:hover { border-color: var(--border3); color: var(--text2); }
    .fchip.on { border-color: var(--accent); background: var(--accentbg); color: var(--accent3); }
    .vsep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
    .search-box { margin-left: auto; display: flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r10); padding: 6px 12px; transition: border-color .15s; }
    .search-box:focus-within { border-color: var(--border3); }
    .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 12px; width: 150px; }
    .search-box input::placeholder { color: var(--text4); }

    /* ── TABLE ─────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 9px 14px; font-size: 9.5px; font-family: var(--mono); color: var(--text4); letter-spacing: .06em; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
    thead th:hover { color: var(--text2); }
    thead th.sorted { color: var(--accent3); }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    tbody tr:hover { background: var(--bg3); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 14px; vertical-align: middle; }
    .ev-name { font-weight: 600; font-size: 12.5px; }
    .ev-sub { font-size: 10.5px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
    .cat-tag { display: inline-block; font-size: 9.5px; font-family: var(--mono); font-weight: 500; padding: 2.5px 7px; border-radius: 5px; }
    .ct-f1 { background: rgba(244,168,54,.12); color: var(--amber); border: 1px solid rgba(244,168,54,.2); }
    .ct-mma { background: var(--redbg); color: var(--red); border: 1px solid var(--redbdr); }
    .ct-concert { background: var(--accentbg); color: var(--accent3); border: 1px solid rgba(108,99,255,.2); }
    .ct-sport { background: var(--greenbg); color: var(--green); border: 1px solid var(--greenbdr); }
    .ct-custom { background: var(--purplebg); color: var(--purple); border: 1px solid rgba(192,132,252,.2); }
    .hdot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; margin-right: 5px; }
    .hn { background: var(--red); } .hm { background: var(--amber); } .hf { background: var(--green); }
    .mf { font-family: var(--mono); font-size: 11.5px; color: var(--text3); }
    .mr { font-family: var(--mono); font-size: 11.5px; font-weight: 500; }
    .mb { font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
    .mb-hot { background: var(--greenbg); color: var(--green); border: 1px solid var(--greenbdr); }
    .mb-mid { background: var(--amberbg); color: var(--amber); border: 1px solid var(--amberbdr); }
    .mb-low { background: var(--bg4); color: var(--text3); }
    .score-row { display: flex; align-items: center; gap: 7px; }
    .score-bg { width: 44px; height: 4px; background: var(--bg5); border-radius: 2px; }
    .score-fg { height: 100%; border-radius: 2px; }
    .score-n { font-family: var(--mono); font-size: 11px; min-width: 24px; }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 13px; opacity: .25; transition: opacity .15s; padding: 2px 5px; }
    .star-btn:hover, .star-btn.on { opacity: 1; }
    .plat-tag { font-size: 9.5px; font-family: var(--mono); color: var(--text3); background: var(--bg4); padding: 2px 7px; border-radius: 5px; border: 1px solid var(--border); }

    /* ── CHARTS ────────────────────────────────────────── */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r20); padding: 18px 20px; }
    .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .chart-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-bottom: 14px; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
    .leg-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* ── ALERTS ────────────────────────────────────────── */
    .alert-row { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--border); transition: background .1s; }
    .alert-row:hover { background: var(--bg3); }
    .alert-row:last-child { border-bottom: none; }
    .alert-icon { width: 34px; height: 34px; border-radius: var(--r10); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .ai-green { background: var(--greenbg); border: 1px solid var(--greenbdr); }
    .ai-amber { background: var(--amberbg); border: 1px solid var(--amberbdr); }
    .ai-blue { background: var(--bluebg); border: 1px solid rgba(96,168,240,.25); }
    .alert-name { font-size: 12.5px; font-weight: 600; }
    .alert-desc { font-size: 10.5px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
    .alert-time { font-size: 10px; color: var(--text4); font-family: var(--mono); flex-shrink: 0; }

    /* ── FORM / ADD EVENT ──────────────────────────────── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 10px; font-family: var(--mono); color: var(--text3); letter-spacing: .04em; }
    .form-input, .form-select {
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r10);
      padding: 9px 13px; color: var(--text); font-size: 12.5px; outline: none; transition: border-color .15s; width: 100%;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-select option { background: var(--bg3); }
    .form-preview { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r10); padding: 12px 16px; font-size: 12px; color: var(--text3); font-family: var(--mono); margin: 0 18px 4px; }
    .form-actions { display: flex; gap: 8px; padding: 12px 18px; justify-content: flex-end; border-top: 1px solid var(--border); }
    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--r10); padding: 9px 20px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: var(--r10); padding: 9px 16px; font-size: 12.5px; cursor: pointer; transition: all .15s; }
    .btn-ghost:hover { border-color: var(--border3); color: var(--text); }
    .custom-ev-item { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--border); transition: background .1s; }
    .custom-ev-item:hover { background: var(--bg3); }
    .cev-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .cev-name { font-size: 12.5px; font-weight: 600; flex: 1; }
    .cev-meta { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
    .del-btn { background: none; border: none; color: var(--text4); cursor: pointer; font-size: 12px; padding: 3px 7px; border-radius: 5px; transition: all .15s; }
    .del-btn:hover { background: var(--redbg); color: var(--red); }

    /* ── ROI / CURRENCY ────────────────────────────────── */
    .roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
    .roi-fields { display: flex; flex-direction: column; gap: 12px; }
    .roi-field { display: grid; grid-template-columns: 145px 1fr 55px; align-items: center; gap: 10px; }
    .roi-lbl { font-size: 11.5px; color: var(--text3); font-family: var(--mono); }
    .roi-inp { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r10); padding: 9px 13px; color: var(--text); font-size: 14px; font-family: var(--mono); outline: none; transition: border-color .15s; width: 100%; }
    .roi-inp:focus { border-color: var(--accent); }
    .roi-unit { font-size: 11.5px; color: var(--text3); font-family: var(--mono); }
    .roi-result { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r14); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .roi-big { font-size: 38px; font-weight: 700; font-family: var(--mono); line-height: 1; }
    .roi-sublbl { font-size: 10px; color: var(--text3); font-family: var(--mono); }
    .roi-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .roi-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r10); padding: 12px 14px; }
    .roi-stat-lbl { font-size: 9.5px; color: var(--text4); font-family: var(--mono); letter-spacing: .04em; margin-bottom: 5px; }
    .roi-stat-val { font-size: 16px; font-weight: 700; font-family: var(--mono); }
    .timeline-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
    .timeline-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width .4s; }
    .curr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 18px; }
    .curr-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r14); padding: 14px 16px; }
    .curr-pair { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-bottom: 6px; }
    .curr-rate { font-size: 20px; font-weight: 700; font-family: var(--mono); }
    .curr-conv-row { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .curr-inp { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r10); padding: 8px 12px; color: var(--text); font-size: 14px; font-family: var(--mono); outline: none; width: 110px; transition: border-color .15s; }
    .curr-inp:focus { border-color: var(--accent); }
    .curr-results { display: flex; gap: 10px; flex-wrap: wrap; }
    .curr-res-item { background: var(--bg4); border-radius: var(--r6); padding: 7px 14px; font-family: var(--mono); font-size: 13px; }
    .curr-sym { color: var(--text3); font-size: 10px; margin-right: 3px; }

    /* ── COMPARATOR ────────────────────────────────────── */
    .comp-search-row { display: flex; align-items: center; gap: 8px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .comp-inp { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r10); padding: 9px 14px; color: var(--text); font-size: 12.5px; outline: none; transition: border-color .15s; }
    .comp-inp:focus { border-color: var(--accent); }
    .comp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 16px 18px; }
    .comp-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r14); overflow: hidden; transition: border-color .2s; }
    .comp-card:hover { border-color: var(--border2); }
    .comp-card-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
    .plat-logo { width: 30px; height: 30px; border-radius: var(--r6); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .comp-plat-name { font-size: 13px; font-weight: 600; }
    .comp-plat-sub { font-size: 9.5px; color: var(--text3); font-family: var(--mono); }
    .comp-badge { margin-left: auto; font-size: 9px; font-family: var(--mono); padding: 2px 8px; border-radius: 5px; font-weight: 500; }
    .comp-rows { padding: 8px 0; }
    .comp-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; }
    .comp-row-lbl { font-size: 11px; color: var(--text3); min-width: 90px; }
    .comp-row-bar { display: flex; align-items: center; gap: 8px; flex: 1; margin: 0 10px; }
    .comp-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
    .comp-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
    .comp-row-val { font-size: 12px; font-weight: 600; font-family: var(--mono); min-width: 60px; text-align: right; }
    .comp-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 16px; }
    .comp-pros, .comp-cons { border-radius: var(--r6); padding: 8px 10px; font-size: 10px; }

function toast(msg, icon = '✓') {
  const el = document.getElementById('toast');
  document.getElementById('t-icon').textContent = icon;
  document.getElementById('t-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function filtered() {
  return allEvs().filter(e => {
    if (S.cat === 'custom') return e.custom === true;
    if (S.cat !== 'all' && e.cat !== S.cat) return false;
    if (S.horizon !== 'all' && e.h !== S.horizon) return false;
    if (e.marge < S.seuil) return false;
    if (S.search && !e.name.toLowerCase().includes(S.search.toLowerCase()) &&
        !e.sub.toLowerCase().includes(S.search.toLowerCase())) return false;
    return true;
  }).sort((a, b) => a[S.sortCol] < b[S.sortCol] ? S.sortDir : -S.sortDir);
}

function sortBy(col) {
  if (S.sortCol === col) S.sortDir *= -1;
  else { S.sortCol = col; S.sortDir = -1; }
  render();
}

function toggleStar(id) {
  const e = allEvs().find(x => x.id === id);
  if (e) { e.starred = !e.starred; if (e.starred) toast(e.name + ' ' + t().toastStar, '★'); render(); }

/* ════════════════════════════════════════════
   TABLE
════════════════════════════════════════════ */
function buildTable(evs) {
  const l = t();
  if (!evs.length) return `<div class="empty"><div class="empty-icon">◎</div>${l.noEvents}</div>`;
  const th = (col, label) => `<th onclick="sortBy('${col}')" class="${S.sortCol === col ? 'sorted' : ''}">${label}${S.sortCol === col ? (S.sortDir < 0 ? ' ↓' : ' ↑') : ''}</th>`;
  return `<div class="tbl-wrap"><table>
    <thead><tr>
      <th style="width:36px"></th>
      ${th('name', l.th[1])}
      <th>${l.th[2]}</th>
      <th>${l.th[3]}</th>
      ${th('face', l.th[4])}
      ${th('resale', l.th[5])}
      ${th('marge', l.th[6])}
      ${th('score', l.th[7])}
      <th>${l.th[8]}</th>
    </tr></thead>
    <tbody>${evs.map(e => `<tr>
      <td><button class="star-btn ${e.starred ? 'on' : ''}" onclick="event.stopPropagation();toggleStar(${e.id})">${e.starred ? '★' : '☆'}</button></td>
      <td><div class="ev-name">${e.flag || '🎫'} ${e.name}</div><div class="ev-sub">${e.sub || ''} · ${e.date}</div></td>
      <td><span class="hdot ${hClass(e.h)}"></span><span style="font-size:10.5px;color:var(--text3)">${hLabel(e.h)}</span></td>
      <td><span class="cat-tag ct-${e.custom ? 'custom' : e.cat}">${e.custom ? 'CUSTOM' : e.cat.toUpperCase()}</span></td>
      <td class="mf">${e.face.toLocaleString()}€</td>
      <td class="mr">${e.resale.toLocaleString()}€</td>
      <td><span class="mb ${mc(e.marge)}">+${e.marge}%</span></td>
      <td><div class="score-row"><span class="score-n" style="color:${sc(e.score)}">${e.score}</span><div class="score-bg"><div class="score-fg" style="width:${Math.round(e.score * 10)}%;background:${sc(e.score)}"></div></div></div></td>
      <td><span class="plat-tag">${e.platform}</span></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

/* ════════════════════════════════════════════
   RENDER DISPATCH
════════════════════════════════════════════ */
function render() {
  document.getElementById('custom-count').textContent = S.customEvents.length;
  const c = document.getElementById('content');
  if (S.view === 'dashboard') renderDash(c);
  else if (S.view === 'events') renderEvents(c);
  else if (S.view === 'add') renderAdd(c);
  else if (S.view === 'roi') renderROI(c);
  else if (S.view === 'compare') renderCompare(c);
  else renderWatchlist(c);
}

function calcPreview() {
  const face = parseFloat(document.getElementById('f-face')?.value) || 0;
  const resale = parseFloat(document.getElementById('f-resale')?.value) || 0;
  const qty = parseInt(document.getElementById('f-qty')?.value) || 1;
  const el = document.getElementById('form-preview');
  if (!el || !face || !resale) return;
  const net = resale * .85;
  const marge = Math.round(((net - face) / face) * 100);
  const gain = Math.round((net - face) * qty);
  const col = marge >= 100 ? 'var(--green)' : marge >= 50 ? 'var(--amber)' : 'var(--text3)';
  el.innerHTML = `Marge estimée&nbsp;: <span style="color:${col};font-weight:600">+${marge}%</span> &nbsp;·&nbsp; Gain net (×${qty})&nbsp;: <span style="color:${col};font-weight:600">${gain >= 0 ? '+' : ''}${gain}€</span> &nbsp;·&nbsp; Investissement total&nbsp;: ${face * qty}€`;
}

function saveEvent() {
  const name = document.getElementById('f-name').value.trim();
  const face = parseFloat(document.getElementById('f-face').value) || 0;
  const resale = parseFloat(document.getElementById('f-resale').value) || 0;
  if (!name || !face || !resale) { toast(t().toastError, '⚠'); return; }
  const net = resale * .85;
  const marge = Math.round(((net - face) / face) * 100);
  S.customEvents.push({
    id: S.nextId++, name,
    sub: document.getElementById('f-lieu').value || '',
    date: document.getElementById('f-date').value || '',
    lieu: document.getElementById('f-lieu').value || '',
    flag: document.getElementById('f-flag').value || '🎫',
    cat: document.getElementById('f-cat').value,
    h: document.getElementById('f-h').value,
    platform: document.getElementById('f-platform').value,
    face, resale, marge,
    score: Math.min(Math.max(Math.round(marge / 20 + 5), 5), 10),
    qty: parseInt(document.getElementById('f-qty').value) || 1,
    notes: document.getElementById('f-notes').value,
    starred: false, custom: true, country: 'CUSTOM',
  });
  toast(t().toastEventAdded, '✓');
  resetForm(); render();
}

function resetForm() {
  ['f-name','f-date','f-lieu','f-flag','f-notes','f-face','f-resale'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  const q = document.getElementById('f-qty'); if (q) q.value = '2';
  const p = document.getElementById('form-preview'); if (p) p.textContent = t().previewDefault;

function renderROI(c) {
  const l = t();
  c.innerHTML = `

        <input class="curr-inp" id="curr-amt" type="number" value="100" oninput="calcCurr()">
        <select class="form-select" id="curr-from" oninput="calcCurr()" style="width:95px;padding:7px 10px;font-size:12px">
          <option value="EUR">€ EUR</option>

          <option value="GBP">£ GBP</option>

        <div class="curr-results" id="curr-res"></div>

function calcROI() {
  const l = t();
  const face = parseFloat(document.getElementById('ri-0')?.value) || 0;
  const resale = parseFloat(document.getElementById('ri-1')?.value) || 0;
  const fees = parseFloat(document.getElementById('ri-2')?.value) || 15;
  const qty = parseInt(document.getElementById('ri-3')?.value) || 1;
  const transport = parseFloat(document.getElementById('ri-4')?.value) || 0;
  const other = parseFloat(document.getElementById('ri-5')?.value) || 0;
  const el = document.getElementById('roi-res');
  if (!el) return;
  const net = resale * (1 - fees / 100);
  const grossGain = (net - face) * qty;
  const invest = (face * qty) + transport + other;
  const netGain = grossGain - transport - other;
  const roi = invest > 0 ? Math.round((netGain / invest) * 100) : 0;
  const breakeven = qty > 0 ? Math.round(invest / qty) : 0;
  const margeNet = face > 0 ? Math.round(((net - face) / face) * 100) : 0;
  const col = roi >= 100 ? 'var(--green)' : roi >= 50 ? 'var(--amber)' : roi < 0 ? 'var(--red)' : 'var(--text3)';
  const barPct = Math.min(Math.max(roi, 0) / 2, 100);
  el.innerHTML = `
    <div class="roi-big" style="color:${col}">${roi >= 0 ? '+' : ''}${roi}%</div>
    <div class="roi-sublbl">${l.roiResultLbl}</div>
    <div class="timeline-bar"><div class="timeline-fill" style="width:${barPct}%"></div></div>
    <div style="font-size:9.5px;color:var(--text4);font-family:var(--mono);margin-top:3px;margin-bottom:8px">${l.timeline} ${resale}€</div>
    <div class="roi-stats">
      <div class="roi-stat"><div class="roi-stat-lbl">${l.roiStats[0]}</div><div class="roi-stat-val">${Math.round(invest)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${l.roiStats[1]}</div><div class="roi-stat-val" style="color:${grossGain >= 0 ? 'var(--green)' : 'var(--red)'}">${grossGain >= 0 ? '+' : ''}${Math.round(grossGain)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${l.roiStats[2]}</div><div class="roi-stat-val" style="color:${col}">${netGain >= 0 ? '+' : ''}${Math.round(netGain)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${l.roiStats[3]}</div><div class="roi-stat-val" style="color:${col}">${margeNet >= 0 ? '+' : ''}${margeNet}%</div></div>
    </div>
    <div class="roi-stat" style="margin-top:10px"><div class="roi-stat-lbl">${l.roiStats[4]}</div><div class="roi-stat-val">${breakeven}€</div></div>
    ${roi < 0 ? `<div style="margin-top:10px;font-size:10.5px;color:var(--red);font-family:var(--mono)">⚠ ROI négatif — vérifiez vos coûts</div>` : ''}
    ${roi >= 100 ? `<div style="margin-top:10px;font-size:10.5px;color:var(--green);font-family:var(--mono)">✓ Excellente rentabilité</div>` : ''}`;
}

function calcCurr() {
  const amt = parseFloat(document.getElementById('curr-amt')?.value) || 0;
  const from = document.getElementById('curr-from')?.value || 'EUR';
  const el = document.getElementById('curr-res'); if (!el) return;
  const pairs = from === 'EUR' ? [['USD','$',FX.EUR_USD],['GBP','£',FX.EUR_GBP]]
              : from === 'USD' ? [['EUR','€',FX.USD_EUR],['GBP','£',FX.USD_GBP]]
              : [['EUR','€',FX.GBP_EUR],['USD','$',FX.GBP_USD]];
  el.innerHTML = pairs.map(([to, sym, rate]) =>
    `<div class="curr-res-item"><span class="curr-sym">${sym}</span><strong>${(amt * rate).toFixed(2)}</strong> <span style="color:var(--text4);font-size:9.5px">${to}</span></div>`
  ).join('');
}

/* ════════════════════════════════════════════
   COMPARATOR
════════════════════════════════════════════ */
function renderCompare(c) {
  const l = t();
  const fp = S.compSearch
    ? PLATFORMS.filter(p => p.coverage.toLowerCase().includes(S.compSearch.toLowerCase()) || p.name.toLowerCase().includes(S.compSearch.toLowerCase()))
    : PLATFORMS;
  c.innerHTML = `<div class="card">
    <div class="card-head"><span class="card-title">${l.compTitle}</span><span class="card-meta">${PLATFORMS.length} plateformes</span></div>
    <div class="comp-search-row">
      <span style="color:var(--text4);font-size:15px">⌕</span>
      <input class="comp-inp" placeholder="${l.compSearch}" value="${S.compSearch}" oninput="S.compSearch=this.value;renderCompare(document.getElementById('content'))">
    </div>
    <div class="comp-grid">
      ${fp.map(p => {
        const feeCol = p.fees <= 10 ? 'var(--green)' : p.fees <= 12 ? 'var(--amber)' : 'var(--red)';
        const barColors = [feeCol,'var(--accent)','var(--blue)','var(--green)'];
        const vals = [p.fees + '%', p.liquidity + '/100', p.speed + '/100', p.guarantee + '%'];
        const pcts = [100 - p.fees, p.liquidity, p.speed, p.guarantee];
        return `<div class="comp-card">
          <div class="comp-card-head">
            <div class="plat-logo" style="background:${p.color}">${p.logo}</div>
            <div><div class="comp-plat-name">${p.name}</div><div class="comp-plat-sub">${p.region}</div></div>
            <div class="comp-badge" style="background:${p.liquidity >= 90 ? 'var(--greenbg)' : 'var(--bg4)'};color:${p.liquidity >= 90 ? 'var(--green)' : 'var(--text3)'};border:1px solid ${p.liquidity >= 90 ? 'var(--greenbdr)' : 'var(--border)'}">
              ${p.liquidity >= 90 ? 'TOP' : 'OK'}
            </div>
          </div>
          <div class="comp-rows">
            ${l.compFields.map((label, i) => `
              <div class="comp-row">
                <span class="comp-row-lbl">${label}</span>
                <div class="comp-row-bar"><div class="comp-bar-track"><div class="comp-bar-fill" style="width:${pcts[i]}%;background:${barColors[i]}"></div></div></div>
                <span class="comp-row-val" style="color:${i === 0 ? feeCol : 'var(--text)'}">${vals[i]}</span>
              </div>`).join('')}
          </div>
          <div style="padding:6px 16px 6px"><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${l.bestFor} : <span style="color:var(--text2)">${p.coverage}</span></div></div>
          <div class="comp-pros-cons">
            <div class="comp-pros"><div class="comp-pc-lbl g">${l.pros}</div>${p.pros.map(x => `<div class="comp-pc-item">· ${x}</div>`).join('')}</div>
            <div class="comp-cons"><div class="comp-pc-lbl r">${l.cons}</div>${p.cons.map(x => `<div class="comp-pc-item">· ${x}</div>`).join('')}</div>
          </div>
          <div class="comp-footer">${l.compDisclaimer}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   WATCHLIST
════════════════════════════════════════════ */
function renderWatchlist(c) {
  const l = t(); const all = allEvs();
  c.innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><span class="card-title">${l.wlTitle}</span><span class="card-meta">${S.wl.length} events</span></div>
      <div class="wl-inp-row">
        <input class="wl-inp" id="wl-inp" placeholder="${l.wlPlaceholder}" onkeydown="if(event.key==='Enter')addWl()">
        <button class="wl-add-btn" onclick="addWl()">${l.wlAdd}</button>
      </div>
      ${S.wl.length === 0
        ? `<div class="empty"><div class="empty-icon">◎</div>${l.wlEmpty}</div>`
        : S.wl.map((w, i) => {
            const m = all.find(e => e.name.toLowerCase().includes(w.toLowerCase().split(' ')[0]));
            return `<div class="wl-item">
              <div class="wl-dot" style="background:${m ? sc(m.score) : '#38384a'}"></div>
              <div style="flex:1">
                <div class="wl-name">${w}</div>
                ${m ? `<div class="wl-meta">${m.flag || '🎫'} ${m.date} · +${m.marge}% · ${m.platform}</div>` : `<div class="wl-meta">—</div>`}
              </div>
              ${m ? `<span class="mb ${mc(m.marge)}" style="margin-right:10px">+${m.marge}%</span>` : ''}
              <button class="wl-del" onclick="S.wl.splice(${i},1);render()">✕</button>
            </div>`;
          }).join('')}
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">${l.starred}</span></div>
      ${buildTable(all.filter(e => e.starred))}
    </div>`;
}

function addWl() {
  const v = document.getElementById('wl-inp').value.trim();
  if (v && !S.wl.includes(v)) { S.wl.push(v); toast('"' + v + '" ' + t().toastAdded, '★'); }
  render();
}

/* ════════════════════════════════════════════
   SCAN
════════════════════════════════════════════ */
async function runScan() {
  const btn = document.getElementById('scan-btn');
  const lbl = document.getElementById('scan-lbl');
  const ic = document.getElementById('scan-ic');
  btn.classList.add('loading');
  lbl.textContent = t().scanning;
  const frames = ['⟳','↻','⟲'];
  let i = 0;
  const anim = setInterval(() => { ic.textContent = frames[i++ % 3]; }, 300);
  await new Promise(r => setTimeout(r, 2200));
  clearInterval(anim);
  btn.classList.remove('loading');
  lbl.textContent = t().scan;
  ic.textContent = '⟳';
  toast(t().toastScan + filtered().length + ' ' + t().toastOpps, '✓');
  render();
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
renderMarkets();
applyLang();
render();
</script>
</body>
</html>
