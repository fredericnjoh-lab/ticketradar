<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TicketRadar</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <div class="topbar-left">
    <div class="logo-mark">TR</div>
    <div class="logo-text">
      <div class="logo-name">TicketRadar</div>
      <div class="logo-tag" id="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-lbl">local</span>
      </div>
    </div>
  </div>
  <nav class="nav-pills" id="nav-pills">
    <button class="npill active" id="nav-dash" onclick="nav('dash',this)">📊 Dashboard</button>
    <button class="npill" id="nav-events" onclick="nav('events',this)">🎫 Events</button>
    <button class="npill" id="nav-kanban" onclick="nav('kanban',this)">📋 Kanban</button>
    <button class="npill" id="nav-drops" onclick="nav('drops',this)">📉 Chutes</button>
    <button class="npill" id="nav-history" onclick="nav('history',this)">📈 Prix</button>
    <button class="npill" id="nav-ai" onclick="nav('ai',this)">🤖 IA</button>
    <button class="npill" id="nav-presale" onclick="nav('presale',this)">🔑 Presale</button>
    <button class="npill" id="nav-map" onclick="nav('map',this)">🗺️ Carte</button>
    <button class="npill" id="nav-wl" onclick="nav('wl',this)">★ Watchlist</button>
    <button class="npill" id="nav-compare" onclick="nav('compare',this)">⚖ Compare</button>
    <button class="npill" id="nav-roi" onclick="nav('roi',this)">💰 ROI</button>
    <button class="npill" id="nav-settings" onclick="nav('settings',this)">⚙ Config</button>
  </nav>
  <div class="topbar-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="lang-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Thème">☀️</button>
    <button id="user-btn" onclick="toggleUserMenu()" style="width:32px;height:32px;border-radius:50%;background:var(--goldbg);border:1px solid var(--goldbdr);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0" title="Mon compte">👤</button>
    <button class="scan-btn" id="scan-btn" onclick="runScan()">
      <span id="scan-ic">⟳</span> <span id="scan-lbl">Scanner</span>
    </button>
  </div>
</div>

<!-- SHELL -->
<div class="shell">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-lbl" id="sb-mkt-lbl">MARCHÉS</div>
      <div id="mkt-list"></div>
    </div>
    <div class="sb-section">
      <div class="sb-lbl" id="sb-seuil-lbl">SEUIL ALERTE</div>
      <div class="seuil-wrap">
        <div class="seuil-row">
          <span class="seuil-lbl" id="sb-min-lbl">marge min.</span>
          <span id="seuil-val">+30%</span>
        </div>
        <input type="range" id="seuil" min="0" max="300" step="5" value="30"
          oninput="S.seuil=+this.value;document.getElementById('seuil-val').textContent='+'+this.value+'%';saveState()">
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-lbl">TELEGRAM</div>
      <div id="tg-sidebar" style="font-size:10px;color:var(--t3);padding:0 8px"></div>
    </div>
  </div>

  <!-- Content -->
  <div id="content"></div>

</div>

<!-- AUTH MODAL -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(5,5,7,.95);backdrop-filter:blur(20px);align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r16);padding:32px;width:360px;max-width:90vw">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:48px;height:48px;background:var(--gold);border-radius:var(--r12);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:20px;color:var(--bg0);margin:0 auto 12px">TR</div>
      <div style="font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-.03em">TicketRadar</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--t3);margin-top:4px" id="auth-subtitle">Connecte-toi pour sauvegarder tes données</div>
    </div>
    <div style="display:flex;gap:4px;background:var(--bg3);border-radius:var(--r8);padding:3px;margin-bottom:20px">
      <button id="tab-signin" onclick="switchAuthTab('signin')" style="flex:1;padding:7px;border-radius:6px;border:none;background:var(--bg5);color:var(--gold2);font-family:var(--font-head);font-size:12px;font-weight:700;cursor:pointer">Connexion</button>
      <button id="tab-signup" onclick="switchAuthTab('signup')" style="flex:1;padding:7px;border-radius:6px;border:none;background:transparent;color:var(--t3);font-family:var(--font-head);font-size:12px;cursor:pointer">Inscription</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input id="auth-email" type="email" placeholder="ton@email.com" style="background:var(--bg3);border:1px solid var(--b3);border-radius:var(--r8);padding:11px 14px;color:var(--t1);font-size:13px;outline:none;font-family:var(--font-body);width:100%;box-sizing:border-box" onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--b3)'" onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
      <div style="position:relative">
        <input id="auth-password" type="password" placeholder="Mot de passe" style="background:var(--bg3);border:1px solid var(--b3);border-radius:var(--r8);padding:11px 40px 11px 14px;color:var(--t1);font-size:13px;outline:none;font-family:var(--font-body);width:100%;box-sizing:border-box" onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--b3)'" onkeydown="if(event.key==='Enter')submitAuth()">
        <button onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--t3);padding:4px" id="pwd-eye">👁</button>
      </div>
      <div id="auth-error" style="font-size:11px;color:var(--red);font-family:var(--font-mono);display:none;padding:8px 12px;background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r8)"></div>
      <button onclick="submitAuth()" id="auth-submit-btn" style="background:var(--gold);color:var(--bg0);border:none;border-radius:var(--r8);padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-head);letter-spacing:.02em;transition:all .15s;width:100%">Se connecter</button>
      <div style="display:flex;align-items:center;gap:8px;margin:2px 0">
        <div style="flex:1;height:1px;background:var(--b3)"></div>
        <span style="font-size:10px;color:var(--t4);font-family:var(--font-mono)">ou</span>
        <div style="flex:1;height:1px;background:var(--b3)"></div>
      </div>
      <button onclick="skipAuth()" style="background:var(--bg3);color:var(--t2);border:1px solid var(--b3);border-radius:var(--r8);padding:11px;font-size:12px;cursor:pointer;font-family:var(--font-body);width:100%">Continuer sans compte</button>
    </div>
    <div id="auth-success" style="display:none;text-align:center;padding:16px;color:var(--green);font-family:var(--font-mono);font-size:12px"></div>
  </div>
</div>

<!-- USER MENU -->
<div id="user-menu" style="display:none;position:fixed;top:60px;right:16px;z-index:500;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r12);padding:12px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.4)">
  <div id="user-email" style="font-family:var(--font-mono);font-size:10px;color:var(--t3);margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--b3)"></div>
  <button onclick="doSignOut()" style="width:100%;background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r8);padding:10px;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body)">👋 Se déconnecter</button>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script src="./app.v7.js"></script>
<script src="./supabase.js"></script>

</body>
</html>
