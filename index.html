<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- CSP géré par GitHub Pages -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TicketRadar — Resale Intelligence v5</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4A843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TicketRadar">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- App styles -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- Toast notification -->
<div class="toast" id="toast">
  <span id="t-icon"></span>
  <span id="t-msg"></span>
</div>

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <div class="logo">
    <div class="logo-mark">TR</div>
    <div class="logo-text">
      <div class="logo-name">TicketRadar</div>
      <div class="logo-tag">resale intelligence v5</div>
    </div>
  </div>
  <div class="nav-center">
    <div class="nav-pills">
      <button class="npill active" onclick="nav('dashboard',this)" id="nav-dashboard">Dashboard</button>
      <button class="npill" onclick="nav('events',this)" id="nav-events">Événements</button>
      <button class="npill" onclick="nav('kanban',this)" id="nav-kanban">Kanban</button>
      <button class="npill" onclick="nav('drops',this)" id="nav-drops">📉 Chutes</button>
      <button class="npill" onclick="nav('add',this)" id="nav-add">+ Ajouter</button>
      <button class="npill" onclick="nav('roi',this)" id="nav-roi">ROI</button>
      <button class="npill" onclick="nav('compare',this)" id="nav-compare">Compare</button>
      <button class="npill" onclick="nav('watchlist',this)" id="nav-watchlist">Watchlist</button>
      <button class="npill" onclick="nav('history',this)" id="nav-history">📈 Prix</button>
      <button class="npill" onclick="nav('map',this)" id="nav-map">🗺️ Carte</button>
      <button class="npill" onclick="nav('discover',this)" id="nav-discover">🔍 Découvrir</button>
      <button class="npill" onclick="nav('settings',this)" id="nav-settings">⚙</button>
    </div>
  </div>
  <div class="topbar-right">
    <button class="back-btn" id="back-btn" onclick="navBack()" style="display:none">← Back</button>
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Mode clair/sombre">☀️</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="lb-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="lb-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="status-dot" id="status-dot"></div>
    <span class="status-lbl" id="status-lbl">—</span>
    <button id="user-btn" onclick="toggleUserMenu()" style="width:32px;height:32px;border-radius:50%;background:var(--goldbg);border:1px solid var(--goldbdr);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0" title="Mon compte">👤</button>
    <button class="scan-btn" id="scan-btn" onclick="runScan()">
      <span class="scan-spin" id="scan-ic">⟳</span>
      <span id="scan-lbl">Scanner</span>
    </button>
  </div>
</div>

<!-- ══ SHELL ══ -->
<div class="shell">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-lbl" id="sb-mkt-lbl">MARCHÉS</div>
      <div id="mkt-list"></div>
    </div>
    <div class="sb-section">
      <div class="sb-lbl" id="sb-seuil-lbl">SEUIL ALERTE</div>
      <div class="seuil-wrap">
        <div class="seuil-row">
          <span class="seuil-lbl" id="sb-min-lbl">marge min.</span>
          <span id="seuil-val">+30%</span>
        </div>
        <input type="range" min="10" max="200" step="5" value="30" id="seuil" oninput="onSeuil(this.value)">
        <div style="display:flex;justify-content:space-between;font-size:8.5px;color:var(--t4);font-family:var(--font-mono);margin-top:3px">
          <span>10%</span><span>200%</span>
        </div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-lbl">SOURCE</div>
      <div style="padding:0 6px">
        <div id="data-source-info" style="font-size:10px;color:var(--t3);line-height:1.8;font-family:var(--font-mono)">En attente...</div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-lbl">TELEGRAM</div>
      <div style="padding:0 6px">
        <div id="tg-sidebar" style="font-size:10px;color:var(--t3);font-family:var(--font-mono)">Non configuré</div>
      </div>
    </div>
    <div style="margin-top:auto;padding:0 6px">
      <div style="font-size:8.5px;color:var(--t4);font-family:var(--font-mono);line-height:1.8">
        TicketRadar v5<br>
        Sheet · Telegram · Kanban<br>
        Prix live · Auto-scan ⏱
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="content" id="content"></div>

</div>

<!-- ══ MOBILE NAV ══ -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="mnav-item active" id="mn-dashboard" onclick="nav('dashboard',document.getElementById('nav-dashboard'));updateMobileNav('dashboard')">
    <span class="mnav-icon">📊</span><span class="mnav-label">Home</span>
  </button>
  <button class="mnav-item" id="mn-events" onclick="nav('events',document.getElementById('nav-events'));updateMobileNav('events')">
    <span class="mnav-icon">🎫</span><span class="mnav-label">Events</span>
  </button>
  <button class="mnav-item" id="mn-kanban" onclick="nav('kanban',document.getElementById('nav-kanban'));updateMobileNav('kanban')">
    <span class="mnav-icon">🗂️</span><span class="mnav-label">Kanban</span>
  </button>
  <button class="mnav-item" id="mn-map" onclick="nav('map',document.getElementById('nav-map'));updateMobileNav('map')">
    <span class="mnav-icon">🗺️</span><span class="mnav-label">Carte</span>
  </button>
  <button class="mnav-item" id="mn-settings" onclick="nav('settings',document.getElementById('nav-settings'));updateMobileNav('settings')">
    <span class="mnav-icon">⚙️</span><span class="mnav-label">Config</span>
  </button>
</nav>

<!-- ══ AUTH MODAL ══ -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(5,5,7,.95);backdrop-filter:blur(20px);align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r16);padding:32px;width:360px;max-width:90vw">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:48px;height:48px;background:var(--gold);border-radius:var(--r12);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:20px;color:var(--bg0);margin:0 auto 12px">TR</div>
      <div style="font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-.03em">TicketRadar</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--t3);margin-top:4px" id="auth-subtitle">Connecte-toi pour sauvegarder tes données</div>
    </div>
    <div style="display:flex;gap:4px;background:var(--bg3);border-radius:var(--r8);padding:3px;margin-bottom:20px">
      <button id="tab-signin" onclick="switchAuthTab('signin')" style="flex:1;padding:7px;border-radius:6px;border:none;background:var(--bg5);color:var(--gold2);font-family:var(--font-head);font-size:12px;font-weight:700;cursor:pointer">Connexion</button>
      <button id="tab-signup" onclick="switchAuthTab('signup')" style="flex:1;padding:7px;border-radius:6px;border:none;background:transparent;color:var(--t3);font-family:var(--font-head);font-size:12px;cursor:pointer">Inscription</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input id="auth-email" type="email" placeholder="ton@email.com"
        style="background:var(--bg3);border:1px solid var(--b3);border-radius:var(--r8);padding:11px 14px;color:var(--t1);font-size:13px;outline:none;font-family:var(--font-body);width:100%;box-sizing:border-box;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--b3)'"
        onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
      <div style="position:relative">
        <input id="auth-password" type="password" placeholder="Mot de passe"
          style="background:var(--bg3);border:1px solid var(--b3);border-radius:var(--r8);padding:11px 40px 11px 14px;color:var(--t1);font-size:13px;outline:none;font-family:var(--font-body);width:100%;box-sizing:border-box;transition:border-color .15s"
          onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--b3)'"
          onkeydown="if(event.key==='Enter')submitAuth()">
        <button onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--t3);padding:4px" id="pwd-eye">👁</button>
      </div>
      <div id="auth-error" style="font-size:11px;color:var(--red);font-family:var(--font-mono);display:none;padding:8px 12px;background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r8)"></div>
      <button onclick="submitAuth()" id="auth-submit-btn"
        style="background:var(--gold);color:var(--bg0);border:none;border-radius:var(--r8);padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-head);letter-spacing:.02em;transition:all .15s;width:100%">
        Se connecter
      </button>
      <div style="display:flex;align-items:center;gap:8px;margin:2px 0">
        <div style="flex:1;height:1px;background:var(--b3)"></div>
        <span style="font-size:10px;color:var(--t4);font-family:var(--font-mono)">ou</span>
        <div style="flex:1;height:1px;background:var(--b3)"></div>
      </div>
      <button onclick="skipAuth()"
        style="background:var(--bg3);color:var(--t2);border:1px solid var(--b3);border-radius:var(--r8);padding:11px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .15s;width:100%"
        onmouseover="this.style.borderColor='var(--b4)'" onmouseout="this.style.borderColor='var(--b3)'">
        Continuer sans compte
      </button>
    </div>
    <div id="auth-success" style="display:none;text-align:center;padding:16px;color:var(--green);font-family:var(--font-mono);font-size:12px"></div>
  </div>
</div>

<!-- ══ USER MENU ══ -->
<div id="user-menu" style="display:none;position:fixed;top:60px;right:16px;z-index:500;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r12);padding:12px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.4)">
  <div id="user-email" style="font-family:var(--font-mono);font-size:10px;color:var(--t3);margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--b3)"></div>
  <button onclick="doSignOut()" style="width:100%;background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r8);padding:10px;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s" onmouseover="this.style.background='var(--red)';this.style.color='#fff'" onmouseout="this.style.background='var(--redbg)';this.style.color='var(--red)'">👋 Se déconnecter</button>
</div>

<!-- ══ SCRIPTS ══ -->
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Config first (constants, data) -->
<script src="./config.js"></script>
<!-- Supabase client -->
<script src="./supabase.js"></script>
<!-- App logic -->
<script src="./app.v6.js"></script>

</body>
</html>
