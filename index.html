<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketRadar — Resale Intelligence v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <script>

    // 2. URL de ton API de scraping sur Railway/Render (laisser vide si pas encore déployé)

  <!-- ════════════════════════════════════════ -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#08080e;--bg2:#0f0f18;--bg3:#16161f;--bg4:#1c1c28;--bg5:#222232;
      --border:#25253a;--border2:#35355a;--border3:#45456a;
      --text:#f0f0f8;--text2:#9898b8;--text3:#55556a;--text4:#38384a;
      --accent:#6c63ff;--accent2:#8b84ff;--accent3:#aba4ff;--accentbg:rgba(108,99,255,.12);
      --green:#22d3a0;--greenbg:rgba(34,211,160,.1);--greenbdr:rgba(34,211,160,.25);
      --amber:#f4a836;--amberbg:rgba(244,168,54,.1);--amberbdr:rgba(244,168,54,.25);
      --red:#f06060;--redbg:rgba(240,96,96,.1);--redbdr:rgba(240,96,96,.25);
      --blue:#60a8f0;--bluebg:rgba(96,168,240,.1);
      --purple:#c084fc;--purplebg:rgba(192,132,252,.1);
      --mono:'JetBrains Mono',monospace;--head:'Space Grotesk',sans-serif;
      --r6:6px;--r10:10px;--r14:14px;--r20:20px;
    }
    html,body{height:100%;}
    body{background:var(--bg);color:var(--text);font-family:var(--head);font-size:13px;line-height:1.5;}
    input,select,button{font-family:var(--head);}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:var(--bg2);}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

    /* ── TOPBAR ── */
    .topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;border-bottom:1px solid var(--border);background:rgba(8,8,14,.97);position:sticky;top:0;z-index:100;}
    .logo-mark{width:32px;height:32px;background:var(--accent);border-radius:var(--r10);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
    .logo-name{font-size:15px;font-weight:700;letter-spacing:-.03em;}
    .logo-tag{font-size:9.5px;color:var(--text3);font-family:var(--mono);}
    .topbar-center{flex:1;display:flex;justify-content:center;}
    .nav-pills{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:3px;}
    .npill{padding:5px 13px;border-radius:var(--r6);font-size:11.5px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:all .15s;white-space:nowrap;}
    .npill:hover{color:var(--text);}
    .npill.active{background:var(--bg5);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.5);}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .lang-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r6);overflow:hidden;}
    .lang-btn{padding:5px 10px;font-size:10.5px;font-weight:600;cursor:pointer;color:var(--text3);border:none;background:transparent;transition:all .15s;font-family:var(--mono);}
    .lang-btn.active{background:var(--accent);color:#fff;}
    .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;position:relative;}
    .pulse::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--green);animation:ping 2s ease-out infinite;opacity:0;}
    @keyframes ping{0%{transform:scale(.8);opacity:.8;}100%{transform:scale(2);opacity:0;}}
    #status-lbl{font-size:10.5px;color:var(--text3);font-family:var(--mono);}
    .scan-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r10);background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
    .scan-btn:hover{background:var(--accent2);}
    .scan-btn.loading{opacity:.6;pointer-events:none;}
    .spin{display:inline-block;}
    .scan-btn.loading .spin{animation:spin .6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── LAYOUT ── */
    .shell{display:flex;min-height:calc(100vh - 56px);}
    .sidebar{width:210px;border-right:1px solid var(--border);padding:16px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:20px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
    .content{flex:1;padding:20px;overflow-y:auto;}

    /* ── SIDEBAR ── */
    .sb-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--text4);padding:0 8px;margin-bottom:4px;font-family:var(--mono);}
    .sb-mkt{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:var(--r6);cursor:pointer;transition:background .1s;}
    .sb-mkt:hover{background:var(--bg3);}
    .sb-mkt-label{font-size:11.5px;color:var(--text2);}
    .sb-mkt.on .sb-mkt-label{color:var(--text);}
    .tog{width:28px;height:15px;border-radius:8px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0;}
    .tog.on{background:var(--accent);}
    .tog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#fff;transition:left .18s;}
    .tog.on::after{left:15px;}
    .seuil-wrap{padding:0 8px;}
    .seuil-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    #seuil-val{font-size:11.5px;font-family:var(--mono);color:var(--accent3);}
    input[type="range"]{width:100%;accent-color:var(--accent);cursor:pointer;}

    /* ── STATUS BANNERS ── */
    .banner{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--r10);margin-bottom:14px;font-size:12px;}
    .banner-loading{background:var(--amberbg);border:1px solid var(--amberbdr);color:var(--amber);}
    .banner-ok{background:var(--greenbg);border:1px solid var(--greenbdr);color:var(--green);}
    .banner-error{background:var(--redbg);border:1px solid var(--redbdr);color:var(--red);}
    .banner-info{background:var(--bluebg);border:1px solid rgba(96,168,240,.25);color:var(--blue);}
    .banner-pulse{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:ping 1.5s ease-out infinite;}
    .banner-loading .banner-pulse{background:var(--amber);}
    .banner-ok .banner-pulse{background:var(--green);}

    /* ── SETTINGS PANEL ── */
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:18px;}
    .setting-group{display:flex;flex-direction:column;gap:6px;}
    .setting-group.full{grid-column:1/-1;}
    .setting-label{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.04em;}
    .setting-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:9px 13px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;transition:border-color .15s;width:100%;}
    .setting-input:focus{border-color:var(--accent);}
    .setting-desc{font-size:10px;color:var(--text4);font-family:var(--mono);margin-top:2px;}
    .btn-save{background:var(--accent);color:#fff;border:none;border-radius:var(--r10);padding:9px 20px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;}
    .btn-save:hover{background:var(--accent2);}
    .btn-secondary{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r10);padding:9px 16px;font-size:12.5px;cursor:pointer;transition:all .15s;}
    .btn-secondary:hover{border-color:var(--border3);color:var(--text);}

    /* ── PUSH NOTIF PANEL ── */
    .notif-status{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);}
    .notif-icon{width:40px;height:40px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .ni-ok{background:var(--greenbg);border:1px solid var(--greenbdr);}
    .ni-off{background:var(--bg3);border:1px solid var(--border);}
    .ni-warn{background:var(--amberbg);border:1px solid var(--amberbdr);}
    .notif-name{font-size:13px;font-weight:600;}
    .notif-sub{font-size:10.5px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
    .btn-notif{padding:8px 16px;border-radius:var(--r10);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--head);transition:all .15s;}
    .btn-notif-on{background:var(--accent);color:#fff;}
    .btn-notif-on:hover{background:var(--accent2);}
    .btn-notif-off{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr);}

    /* ── KPI CARDS ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
    .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r14);padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s;}
    .kpi-card:hover{border-color:var(--border2);}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
    .kc-green::before{background:var(--green);}.kc-accent::before{background:var(--accent);}
    .kc-amber::before{background:var(--amber);}.kc-blue::before{background:var(--blue);}
    .kc-purple::before{background:var(--purple);}
    .kpi-lbl{font-size:9.5px;font-weight:500;letter-spacing:.05em;color:var(--text3);margin-bottom:8px;font-family:var(--mono);}
    .kpi-val{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1;}
    .kpi-sub{font-size:9.5px;color:var(--text3);margin-top:5px;}
    .kpi-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;margin-top:6px;}
    .kb-up{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr);}
    .kb-warn{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberbdr);}

    /* ── CARD ── */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r20);overflow:hidden;margin-bottom:16px;}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
    .card-title{font-size:13px;font-weight:600;}
    .card-meta{font-size:10.5px;color:var(--text3);font-family:var(--mono);}
    .card-act{font-size:11px;color:var(--accent3);cursor:pointer;font-weight:500;}

    /* ── TABLE ── */
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:9px 14px;font-size:9.5px;font-family:var(--mono);color:var(--text4);letter-spacing:.06em;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
    thead th:hover{color:var(--text2);}
    thead th.sorted{color:var(--accent3);}
    tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
    tbody tr:hover{background:var(--bg3);}
    tbody tr:last-child{border-bottom:none;}
    td{padding:11px 14px;vertical-align:middle;}
    .ev-name{font-weight:600;font-size:12.5px;}
    .ev-sub{font-size:10.5px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
    .cat-tag{display:inline-block;font-size:9.5px;font-family:var(--mono);font-weight:500;padding:2.5px 7px;border-radius:5px;}
    .ct-f1{background:rgba(244,168,54,.12);color:var(--amber);border:1px solid rgba(244,168,54,.2);}
    .ct-mma{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr);}
    .ct-concert{background:var(--accentbg);color:var(--accent3);border:1px solid rgba(108,99,255,.2);}
    .ct-sport{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr);}
    .ct-custom{background:var(--purplebg);color:var(--purple);border:1px solid rgba(192,132,252,.2);}
    .hdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;margin-right:5px;}
    .hn{background:var(--red);}.hm{background:var(--amber);}.hf{background:var(--green);}
    .mf{font-family:var(--mono);font-size:11.5px;color:var(--text3);}
    .mr{font-family:var(--mono);font-size:11.5px;font-weight:500;}
    .mb{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;}
    .mb-hot{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr);}
    .mb-mid{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberbdr);}
    .mb-low{background:var(--bg4);color:var(--text3);}
    .live-badge{font-size:8.5px;font-family:var(--mono);background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr);padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;}
    .score-row{display:flex;align-items:center;gap:7px;}
    .score-bg{width:44px;height:4px;background:var(--bg5);border-radius:2px;}
    .score-fg{height:100%;border-radius:2px;}
    .score-n{font-family:var(--mono);font-size:11px;min-width:24px;}
    .star-btn{background:none;border:none;cursor:pointer;font-size:13px;opacity:.25;transition:opacity .15s;padding:2px 5px;}
    .star-btn:hover,.star-btn.on{opacity:1;}
    .plat-tag{font-size:9.5px;font-family:var(--mono);color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:5px;border:1px solid var(--border);}

    /* ── CHART ── */
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
    .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r20);padding:18px 20px;}
    .chart-title{font-size:13px;font-weight:600;margin-bottom:2px;}
    .chart-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:14px;}
    .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
    .leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

    /* ── ALERTS ── */
    .alert-row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border);transition:background .1s;}
    .alert-row:hover{background:var(--bg3);}
    .alert-row:last-child{border-bottom:none;}
    .alert-icon{width:34px;height:34px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .ai-green{background:var(--greenbg);border:1px solid var(--greenbdr);}
    .ai-amber{background:var(--amberbg);border:1px solid var(--amberbdr);}
    .ai-blue{background:var(--bluebg);border:1px solid rgba(96,168,240,.25);}
    .alert-name{font-size:12.5px;font-weight:600;}
    .alert-desc{font-size:10.5px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
    .alert-time{font-size:10px;color:var(--text4);font-family:var(--mono);flex-shrink:0;}

    /* ── TOOLBAR ── */
    .toolbar{display:flex;align-items:center;gap:6px;padding:10px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .fchip{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;white-space:nowrap;}
    .fchip:hover{border-color:var(--border3);color:var(--text2);}
    .fchip.on{border-color:var(--accent);background:var(--accentbg);color:var(--accent3);}
    .vsep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0;}
    .search-box{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:6px 12px;transition:border-color .15s;}
    .search-box:focus-within{border-color:var(--border3);}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:150px;}
    .search-box input::placeholder{color:var(--text4);}

    /* ── FORM ── */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px;}
    .form-group{display:flex;flex-direction:column;gap:5px;}
    .form-group.full{grid-column:1/-1;}
    .form-label{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.04em;}
    .form-input,.form-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:9px 13px;color:var(--text);font-size:12.5px;outline:none;transition:border-color .15s;width:100%;}
    .form-input:focus,.form-select:focus{border-color:var(--accent);}
    .form-select option{background:var(--bg3);}
    .form-preview{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:12px 16px;font-size:12px;color:var(--text3);font-family:var(--mono);margin:0 18px 4px;}
    .form-actions{display:flex;gap:8px;padding:12px 18px;justify-content:flex-end;border-top:1px solid var(--border);}
    .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:var(--r10);padding:9px 20px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;}
    .btn-primary:hover{background:var(--accent2);}
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r10);padding:9px 16px;font-size:12.5px;cursor:pointer;transition:all .15s;}

    /* ── ROI ── */
    .roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px;}
    .roi-fields{display:flex;flex-direction:column;gap:12px;}
    .roi-field{display:grid;grid-template-columns:145px 1fr 55px;align-items:center;gap:10px;}
    .roi-lbl{font-size:11.5px;color:var(--text3);font-family:var(--mono);}
    .roi-inp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:9px 13px;color:var(--text);font-size:14px;font-family:var(--mono);outline:none;transition:border-color .15s;width:100%;}
    .roi-inp:focus{border-color:var(--accent);}
    .roi-unit{font-size:11.5px;color:var(--text3);font-family:var(--mono);}
    .roi-result{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r14);padding:20px;display:flex;flex-direction:column;gap:12px;}
    .roi-big{font-size:38px;font-weight:700;font-family:var(--mono);line-height:1;}
    .roi-sublbl{font-size:10px;color:var(--text3);font-family:var(--mono);}
    .roi-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .roi-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r10);padding:12px 14px;}
    .roi-stat-lbl{font-size:9.5px;color:var(--text4);font-family:var(--mono);letter-spacing:.04em;margin-bottom:5px;}
    .roi-stat-val{font-size:16px;font-weight:700;font-family:var(--mono);}
    .timeline-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;}
    .timeline-fill{height:100%;border-radius:4px;background:var(--green);transition:width .4s;}

    /* ── CURRENCY ── */
    .curr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 18px;}
    .curr-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r14);padding:14px 16px;}
    .curr-pair{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:6px;}
    .curr-rate{font-size:20px;font-weight:700;font-family:var(--mono);}
    .curr-conv-row{display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid var(--border);flex-wrap:wrap;}
    .curr-inp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:8px 12px;color:var(--text);font-size:14px;font-family:var(--mono);outline:none;width:110px;transition:border-color .15s;}
    .curr-inp:focus{border-color:var(--accent);}
    .curr-results{display:flex;gap:10px;flex-wrap:wrap;}
    .curr-res-item{background:var(--bg4);border-radius:var(--r6);padding:7px 14px;font-family:var(--mono);font-size:13px;}

    .wl-del:hover{background:var(--redbg);color:var(--red);}

    /* ── CUSTOM EVENTS ── */

    .empty{padding:48px;text-align:center;color:var(--text4);}
    .empty-icon{font-size:30px;margin-bottom:12px;opacity:.4;}

    .toast{position:fixed;bottom:24px;right:24px;background:var(--bg5);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 16px;font-size:12.5px;display:flex;align-items:center;gap:8px;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;max-width:340px;}

    @media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}.chart-grid,.roi-grid,.comp-grid{grid-template-columns:1fr;}.sidebar{display:none;}}
    @media(max-width:640px){.topbar-center{display:none;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}

    .mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,14,.97);border-top:1px solid var(--border);padding:6px 4px;padding-bottom:env(safe-area-inset-bottom,6px);display:none;justify-content:space-around;align-items:center;}

</head>

/* ══════════════════════════════════════════════

const S = {

  view: 'dashboard',

  compSearch: '', nextId: 300,

  liveData: {}, // prix live depuis l'API
  charts: {},
};

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const allEvs = () => [...(S.sheetLoaded ? S.sheetEvents : FALLBACK_EVENTS), ...S.customEvents];
const sc = s => s >= 9 ? '#22d3a0' : s >= 8 ? '#f4a836' : '#55556a';
const mc = m => m >= 100 ? 'mb-hot' : m >= 50 ? 'mb-mid' : 'mb-low';
const hLabel = h => h === 'now' ? (S.lang==='fr'?'Imminent':'Imminent') : h === 'mid' ? (S.lang==='fr'?'Court terme':'Short-term') : (S.lang==='fr'?'Déc. 2026':'Dec. 2026');
const hClass = h => h === 'now' ? 'hn' : h === 'mid' ? 'hm' : 'hf';

function toast(msg, icon='✓') {
  const el = document.getElementById('toast');
  document.getElementById('t-icon').textContent = icon;
  document.getElementById('t-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function saveState() {
  localStorage.setItem('tr-lang', S.lang);
  localStorage.setItem('tr-seuil', S.seuil);
  localStorage.setItem('tr-wl', JSON.stringify(S.wl));
  localStorage.setItem('tr-custom', JSON.stringify(S.customEvents));
  localStorage.setItem('tr-sheet-url', S.sheetUrl);
  localStorage.setItem('tr-api-url', S.apiUrl);
}

function filtered() {
  return allEvs().filter(e => {
    if (S.cat === 'custom') return e.custom === true;
    if (S.cat !== 'all' && e.cat !== S.cat) return false;
    if (S.horizon !== 'all' && e.h !== S.horizon) return false;
    if (e.marge < S.seuil) return false;
    if (S.search && !e.name.toLowerCase().includes(S.search.toLowerCase()) &&
        !(e.sub||'').toLowerCase().includes(S.search.toLowerCase())) return false;
    return true;
  }).sort((a, b) => a[S.sortCol] < b[S.sortCol] ? S.sortDir : -S.sortDir);
}

function sortBy(col) {
  if (S.sortCol === col) S.sortDir *= -1;
  else { S.sortCol = col; S.sortDir = -1; }
  render();
}

function toggleStar(id) {
  const e = allEvs().find(x => x.id === id);
  if (e) { e.starred = !e.starred; saveState(); render(); }
}

/* ══════════════════════════════════════════════
   GOOGLE SHEET LOADER
══════════════════════════════════════════════ */
async function loadSheet() {
  if (!S.sheetUrl || S.sheetUrl === 'COLLE_ICI_L_URL_CSV_DE_TON_SHEET') {
    S.sheetLoaded = false;
    updateDataSourceInfo('not-configured');
    render();
    return;
  }

  S.loadingSheet = true;
  updateDataSourceInfo('loading');
  render();

  try {
    // iOS Safari PWA needs explicit CORS mode + cache bypass
    const fetchUrl = S.sheetUrl + (S.sheetUrl.includes('?') ? '&' : '?') + 'cache=' + Date.now();
    const res = await fetch(fetchUrl, {
      method: 'GET',
      mode: 'cors',
      cache: 'no-store',
      headers: { 'Accept': 'text/csv,text/plain,*/*' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const events = parseSheetCSV(text);

    if (events.length === 0) throw new Error('Sheet vide ou format incorrect');

    S.sheetEvents = events;
    S.sheetLoaded = true;
    S.sheetError = '';
    S.loadingSheet = false;
    updateDataSourceInfo('ok', events.length);

    // Enrichit avec les prix live si l'API est configurée
    if (S.apiUrl) await enrichWithLivePrices();

    toast(`✅ ${events.length} events chargés depuis Google Sheet`, '📊');
    render();

  } catch (err) {
    S.sheetLoaded = false;
    S.sheetError = err.message;
    S.loadingSheet = false;
    updateDataSourceInfo('error', 0, err.message);
    toast('Erreur Sheet : ' + err.message, '⚠');
    render();
  }
}

function parseSheetCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];

  const headers = splitCSV(lines[0]).map(h => h.trim().replace(/"/g, '').toLowerCase());
  let nextId = 1000;

  return lines.slice(1).map(line => {
    const cols = splitCSV(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = (cols[i] || '').replace(/"/g, '').trim(); });

    const face = parseFloat(row.face) || 0;
    const resale = parseFloat(row.resale) || 0;
    const net = resale * 0.85;
    const marge = face > 0 ? Math.round(((net - face) / face) * 100) : 0;
    const score = parseFloat(row.score) || Math.min(Math.max(Math.round(marge / 20 + 5), 5), 10);

    return {
      id: nextId++,
      name: row.name || '',
      sub: row.sub || row.lieu || '',
      date: row.date || '',
      h: row.horizon || row.h || 'mid',
      country: row.country || 'FR',
      flag: row.flag || '🎫',
      cat: row.cat || row.category || 'concert',
      platform: row.platform || '',
      face, resale, marge, score,
      starred: false, custom: false, live: false,
    };
  }).filter(e => e.name && e.face > 0);
}

function splitCSV(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (const char of line) {
    if (char === '"') inQuotes = !inQuotes;
    else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
    else current += char;
  }
  result.push(current);
  return result;
}

function updateDataSourceInfo(status, count = 0, error = '') {
  const el = document.getElementById('data-source-info');
  if (!el) return;

  const msgs = {
    'not-configured': '<span style="color:var(--amber)">Sheet non configuré<br>→ onglet Config</span>',
    'loading': '<span style="color:var(--blue)">⟳ Chargement du Sheet...</span>',
    'ok': `<span style="color:var(--green)">✓ Sheet connecté<br>${count} events chargés</span>`,
    'error': `<span style="color:var(--red)">✕ Erreur: ${error}</span>`,
  };
  el.innerHTML = msgs[status] || msgs['not-configured'];
}

/* ══════════════════════════════════════════════
   LIVE PRICES (API Scraper)
══════════════════════════════════════════════ */
async function enrichWithLivePrices() {
  if (!S.apiUrl) return;
  try {
    const res = await fetch(S.apiUrl + '/prices');
    if (!res.ok) return;
    const data = await res.json();
    const prices = data.data || data;

    // Mappe les prix live sur les events
    const evs = S.sheetLoaded ? S.sheetEvents : FALLBACK_EVENTS;
    for (const ev of evs) {
      const match = prices.find(p => {
        const key = p.event_key || '';
        return ev.name.toLowerCase().includes(key) || key.includes(ev.name.toLowerCase().split(' ')[0]);
      });
      if (match && match.resale_avg > 0) {
        const oldResale = ev.resale;
        ev.resale = match.resale_avg;
        const net = ev.resale * 0.85;
        ev.marge = ev.face > 0 ? Math.round(((net - ev.face) / ev.face) * 100) : 0;
        ev.live = match.source === 'live';
        S.liveData[ev.id] = { resale: match.resale_avg, platform: match.platform, source: match.source };
      }
    }
    toast('Prix live mis à jour', '📡');
  } catch (err) {
    console.warn('API live prices error:', err);
  }
}

══════════════════════════════════════════════ */
async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) {
    S.notifStatus = 'unsupported';
    return;
  }
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    // Envoie la config au Service Worker
    if (reg.active) {
      reg.active.postMessage({
        type: 'CONFIG',
        payload: { sheetUrl: S.sheetUrl, seuil: S.seuil }
      });
    }
    console.log('[App] Service Worker enregistré');
  } catch (err) {
    console.warn('[App] SW non enregistré:', err);
  }
}

async function requestNotifications() {
  if (!('Notification' in window)) {
    S.notifStatus = 'unsupported';
    toast('Notifications non supportées par ce navigateur', '⚠');
    render();
    return;
  }

  const perm = await Notification.requestPermission();
  S.notifStatus = perm;
  localStorage.setItem('tr-notif', perm);

  if (perm === 'granted') {
    await registerServiceWorker();
    toast('Notifications activées ✓ — tu seras alerté des opportunités !', '🔔');
  } else {
    toast('Notifications refusées dans les paramètres du navigateur', '⚠');
  }
  render();
}

function disableNotifications() {
  S.notifStatus = 'denied-by-user';
  localStorage.setItem('tr-notif', 'denied-by-user');
  toast('Notifications désactivées', '🔕');
  render();
}

function testNotification() {

function calcPreview() {
  const face=parseFloat(document.getElementById('f-face')?.value)||0;
  const resale=parseFloat(document.getElementById('f-resale')?.value)||0;
  const qty=parseInt(document.getElementById('f-qty')?.value)||1;
  const el=document.getElementById('form-preview'); if(!el||!face||!resale)return;
  const net=resale*.85; const marge=Math.round(((net-face)/face)*100);
  const gain=Math.round((net-face)*qty);
  const col=marge>=100?'var(--green)':marge>=50?'var(--amber)':'var(--text3)';
  el.innerHTML=`Marge : <span style="color:${col};font-weight:600">+${marge}%</span> · Gain net (×${qty}) : <span style="color:${col};font-weight:600">${gain>=0?'+':''}${gain}€</span> · Investi : ${face*qty}€`;
}

function saveEvent() {
  const name=document.getElementById('f-name').value.trim();
  const face=parseFloat(document.getElementById('f-face').value)||0;
  const resale=parseFloat(document.getElementById('f-resale').value)||0;
  if(!name||!face||!resale){toast(S.lang==='fr'?'Renseignez le nom, prix face et revente':'Enter name, face value and resale','⚠');return;}
  const net=resale*.85; const marge=Math.round(((net-face)/face)*100);
  S.customEvents.push({
    id:S.nextId++, name, sub:document.getElementById('f-lieu').value||'',
    date:document.getElementById('f-date').value||'', lieu:document.getElementById('f-lieu').value||'',
    flag:document.getElementById('f-flag').value||'🎫', cat:document.getElementById('f-cat').value,
    h:document.getElementById('f-h').value, platform:document.getElementById('f-platform').value,
    face,resale,marge, score:Math.min(Math.max(Math.round(marge/20+5),5),10),
    qty:parseInt(document.getElementById('f-qty').value)||1, notes:document.getElementById('f-notes').value,
    starred:false, custom:true, live:false, country:'CUSTOM',
  });
  saveState();
  toast(S.lang==='fr'?'Event enregistré !':'Event saved!','✓');
  resetForm(); render();
}

function resetForm() {
  ['f-name','f-date','f-lieu','f-flag','f-notes','f-face','f-resale'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const q=document.getElementById('f-qty');if(q)q.value='2';
  const p=document.getElementById('form-preview');if(p)p.textContent=S.lang==='fr'?'Renseignez le prix face et revente pour la prévisualisation...':'Enter face value and resale price to preview...';
}

function deleteCustom(i){S.customEvents.splice(i,1);saveState();render();}

function calcROI() {
  const fr=S.lang==='fr';
  const face=parseFloat(document.getElementById('ri-0')?.value)||0;
  const resale=parseFloat(document.getElementById('ri-1')?.value)||0;
  const fees=parseFloat(document.getElementById('ri-2')?.value)||15;
  const qty=parseInt(document.getElementById('ri-3')?.value)||1;
  const transport=parseFloat(document.getElementById('ri-4')?.value)||0;
  const other=parseFloat(document.getElementById('ri-5')?.value)||0;
  const el=document.getElementById('roi-res'); if(!el)return;
  const net=resale*(1-fees/100);
  const grossGain=(net-face)*qty;
  const invest=(face*qty)+transport+other;
  const netGain=grossGain-transport-other;
  const roi=invest>0?Math.round((netGain/invest)*100):0;
  const breakeven=qty>0?Math.round(invest/qty):0;
  const margeNet=face>0?Math.round(((net-face)/face)*100):0;
  const col=roi>=100?'var(--green)':roi>=50?'var(--amber)':roi<0?'var(--red)':'var(--text3)';
  const roiStats=fr?['Investi total','Gain brut','Gain net','Marge nette','Break-even / billet']:['Total invested','Gross gain','Net gain','Net margin','Break-even / ticket'];
  el.innerHTML=`
    <div class="roi-big" style="color:${col}">${roi>=0?'+':''}${roi}%</div>
    <div class="roi-sublbl">${fr?'ROI net total':'Total net ROI'}</div>
    <div class="timeline-bar"><div class="timeline-fill" style="width:${Math.min(Math.max(roi,0)/2,100)}%"></div></div>
    <div style="font-size:9.5px;color:var(--text4);font-family:var(--mono);margin-top:3px;margin-bottom:8px">${fr?'Break-even si revente à':'Break-even if resale at'} ${resale}€</div>
    <div class="roi-stats">
      <div class="roi-stat"><div class="roi-stat-lbl">${roiStats[0]}</div><div class="roi-stat-val">${Math.round(invest)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${roiStats[1]}</div><div class="roi-stat-val" style="color:${grossGain>=0?'var(--green)':'var(--red)'}">${grossGain>=0?'+':''}${Math.round(grossGain)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${roiStats[2]}</div><div class="roi-stat-val" style="color:${col}">${netGain>=0?'+':''}${Math.round(netGain)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${roiStats[3]}</div><div class="roi-stat-val" style="color:${col}">${margeNet>=0?'+':''}${margeNet}%</div></div>
    </div>
    <div class="roi-stat" style="margin-top:10px"><div class="roi-stat-lbl">${roiStats[4]}</div><div class="roi-stat-val">${breakeven}€</div></div>
    ${roi<0?`<div style="margin-top:10px;font-size:10.5px;color:var(--red);font-family:var(--mono)">⚠ ROI ${fr?'négatif':'negative'}</div>`:''}
    ${roi>=100?`<div style="margin-top:10px;font-size:10.5px;color:var(--green);font-family:var(--mono)">✓ ${fr?'Excellente rentabilité':'Excellent ROI'}</div>`:''}`;
}

function calcCurr() {

  const from=document.getElementById('curr-from')?.value||'EUR';
  const el=document.getElementById('curr-res'); if(!el)return;
  const pairs=from==='EUR'?[['USD','$',FX.EUR_USD],['GBP','£',FX.EUR_GBP]]:from==='USD'?[['EUR','€',FX.USD_EUR],['GBP','£',FX.USD_GBP]]:[['EUR','€',FX.GBP_EUR],['USD','$',FX.GBP_USD]];
  el.innerHTML=pairs.map(([to,sym,rate])=>`<div class="curr-res-item"><span class="curr-sym">${sym}</span><strong>${(amt*rate).toFixed(2)}</strong> <span style="color:var(--text4);font-size:9.5px">${to}</span></div>`).join('');
}

    <div class="card" style="margin-bottom:12px">
      <div class="card-head"><span class="card-title">${fr?'Watchlist':'Watchlist'}</span><span class="card-meta">${S.wl.length} events</span></div>
      <div class="wl-inp-row"><input class="wl-inp" id="wl-inp" placeholder="${fr?'Ajouter un event...':'Add an event...'}" onkeydown="if(event.key==='Enter')addWl()"><button class="wl-add-btn" onclick="addWl()">+ ${fr?'Ajouter':'Add'}</button></div>
      ${S.wl.length===0?`<div class="empty"><div class="empty-icon">◎</div>${fr?'Watchlist vide':'Watchlist empty'}</div>`:
        S.wl.map((w,i)=>{const m=all.find(e=>e.name.toLowerCase().includes(w.toLowerCase().split(' ')[0]));
          return`<div class="wl-item"><div class="wl-dot" style="background:${m?sc(m.score):'#38384a'}"></div><div style="flex:1"><div class="wl-name">${w}</div>${m?`<div class="wl-meta">${m.flag||'🎫'} ${m.date} · +${m.marge}% · ${m.platform}${m.live?' · 📡 live':''}</div>`:'<div class="wl-meta">—</div>'}</div>${m?`<span class="mb ${mc(m.marge)}" style="margin-right:8px">+${m.marge}%</span>`:''}<button class="wl-del" onclick="S.wl.splice(${i},1);saveState();render()">✕</button></div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">${fr?'Favoris ★':'Favourites ★'}</span></div>
      ${buildTable(all.filter(e=>e.starred))}
    </div>`;
}

function addWl() {
  const v=document.getElementById('wl-inp').value.trim();
  if(v&&!S.wl.includes(v)){S.wl.push(v);saveState();toast('"'+v+'" '+( S.lang==='fr'?'ajouté à la watchlist':'added to watchlist'),'★');}
  render();
}

/* ══════════════════════════════════════════════
   SCAN BUTTON
══════════════════════════════════════════════ */
async function runScan() {
  const btn=document.getElementById('scan-btn'),lbl=document.getElementById('scan-lbl'),ic=document.getElementById('scan-ic');
  btn.classList.add('loading');
  lbl.textContent=S.lang==='fr'?'Scan...':'Scanning...';
  const frames=['⟳','↻','⟲'];let i=0;
  const anim=setInterval(()=>{ic.textContent=frames[i++%3];},300);

  // Recharge Sheet + enrichit avec prix live
  await loadSheet();
  if(S.apiUrl)await enrichWithLivePrices();

  clearInterval(anim);
  btn.classList.remove('loading');
  lbl.textContent=S.lang==='fr'?'Scanner':'Scan now';
  ic.textContent='⟳';
  toast((S.lang==='fr'?'Scan terminé — ':'Scan done — ')+filtered().length+(S.lang==='fr'?' opportunités':' opportunities'),'✓');
  render();
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
// Restaure statut notifications
S.notifStatus = localStorage.getItem('tr-notif') || ('Notification' in window ? Notification.permission : 'unsupported');
if (S.notifStatus === 'granted') registerServiceWorker();

renderMarkets();
applyLang();
render();

// Charge le Sheet au démarrage
loadSheet();
</script>
</body>
</html>
