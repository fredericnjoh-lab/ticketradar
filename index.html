<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TicketRadar — Resale Intelligence v5</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4A843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TicketRadar">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <script>
    const SHEET_CSV_URL = "COLLE_ICI_L_URL_CSV_DE_TON_SHEET";
    const SCRAPER_API_URL = "";
  </script>

  <style>
    /* ══════════════════════════════════════════════
       DESIGN SYSTEM v5
       Direction : "Trading Terminal de luxe"
       Noir profond · Or ambre · Typographie sharp
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Backgrounds */
      --bg0: #050507;
      --bg1: #0a0a0f;
      --bg2: #0f0f16;
      --bg3: #14141e;
      --bg4: #1a1a26;
      --bg5: #20202e;
      --bg6: #282838;

      /* Gold accent system */
      --gold:    #D4A843;
      --gold2:   #E8BF6A;
      --gold3:   #F2D08A;
      --goldbg:  rgba(212,168,67,.08);
      --goldbdr: rgba(212,168,67,.2);

      /* Semantic colors */
      --green:   #2DD4A0;
      --greenbg: rgba(45,212,160,.08);
      --greenbdr:rgba(45,212,160,.2);
      --red:     #FF5E5E;
      --redbg:   rgba(255,94,94,.08);
      --redbdr:  rgba(255,94,94,.2);
      --blue:    #5BA4F5;
      --bluebg:  rgba(91,164,245,.08);
      --bluebdr: rgba(91,164,245,.2);
      --purple:  #A78BFA;
      --purplebg:rgba(167,139,250,.08);

      /* Text */
      --t1: #F0EDE8;
      --t2: #A09A90;
      --t3: #605A52;
      --t4: #353028;

      /* Borders */
      --b1: rgba(212,168,67,.12);
      --b2: rgba(212,168,67,.2);
      --b3: rgba(240,237,232,.06);
      --b4: rgba(240,237,232,.1);

      /* Typography */
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      /* Radii */
      --r4: 4px; --r8: 8px; --r12: 12px; --r16: 16px; --r24: 24px;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg0);
      color: var(--t1);
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    input, select, button { font-family: var(--font-body); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg1); }
    ::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 2px; }

    /* ══ TOPBAR ══ */
    .topbar {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: var(--bg1);
      border-bottom: 1px solid var(--b1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--gold);
      border-radius: var(--r8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 13px;
      color: var(--bg0);
      letter-spacing: -.02em;
    }
    .logo-text { display: flex; flex-direction: column; }
    .logo-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      color: var(--t1);
      letter-spacing: -.03em;
      line-height: 1;
    }
    .logo-tag {
      font-family: var(--font-mono);
      font-size: 8.5px;
      color: var(--t3);
      letter-spacing: .06em;
    }

    /* Nav pills */
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-pills {
      display: flex;
      gap: 1px;
      background: var(--bg2);
      border: 1px solid var(--b3);
      border-radius: var(--r12);
      padding: 3px;
    }
    .npill {
      padding: 5px 12px;
      border-radius: var(--r8);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      color: var(--t3);
      border: none;
      background: transparent;
      transition: all .15s;
      white-space: nowrap;
      font-family: var(--font-body);
    }
    .npill:hover { color: var(--t2); }
    .npill.active {
      background: var(--bg5);
      color: var(--gold2);
      border: 1px solid var(--b1);
    }

    /* Status + scan */
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      position: relative;
    }
    .status-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid var(--green);
      animation: ping 2s ease-out infinite;
      opacity: 0;
    }
    @keyframes ping { 0%{transform:scale(.8);opacity:.8;} 100%{transform:scale(2.2);opacity:0;} }
    .status-lbl { font-family: var(--font-mono); font-size: 10px; color: var(--t3); }
    .lang-toggle {
      display: flex;
      background: var(--bg2);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      overflow: hidden;
    }
    .lang-btn {
      padding: 4px 9px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      color: var(--t3);
      border: none;
      background: transparent;
      transition: all .15s;
      font-family: var(--font-mono);
    }
    .lang-btn.active { background: var(--gold); color: var(--bg0); }
    .scan-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--r8);
      background: var(--gold);
      border: none;
      color: var(--bg0);
      font-size: 11.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-head);
      letter-spacing: .02em;
    }
    .scan-btn:hover { background: var(--gold2); }
    .scan-btn.loading { opacity: .6; pointer-events: none; }
    .scan-spin { display: inline-block; }
    .scan-btn.loading .scan-spin { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ LAYOUT ══ */
    .shell { display: flex; min-height: calc(100vh - 52px); }

    /* Sidebar */
    .sidebar {
      width: 200px;
      border-right: 1px solid var(--b1);
      padding: 16px 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
    }
    .sb-section { display: flex; flex-direction: column; gap: 6px; }
    .sb-lbl {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--t4);
      padding: 0 6px;
      font-family: var(--font-mono);
    }
    .sb-mkt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      border-radius: var(--r8);
      cursor: pointer;
      transition: background .1s;
    }
    .sb-mkt:hover { background: var(--bg3); }
    .sb-mkt-label { font-size: 11.5px; color: var(--t3); }
    .sb-mkt.on .sb-mkt-label { color: var(--t2); }
    .tog {
      width: 26px; height: 14px;
      border-radius: 7px;
      background: var(--bg5);
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
    }
    .tog.on { background: var(--gold); }
    .tog::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--t1);
      transition: left .18s;
    }
    .tog.on::after { left: 14px; }
    .seuil-wrap { padding: 0 6px; }
    .seuil-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .seuil-lbl { font-size: 11px; color: var(--t3); }
    #seuil-val { font-family: var(--font-mono); font-size: 11px; color: var(--gold2); }
    input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; }

    /* Content */
    .content { flex: 1; padding: 20px; overflow-y: auto; }

    /* ══ BANNERS ══ */
    .banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--r12);
      margin-bottom: 14px;
      font-size: 12px;
    }
    .banner-gold { background: var(--goldbg); border: 1px solid var(--goldbdr); color: var(--gold2); }
    .banner-green { background: var(--greenbg); border: 1px solid var(--greenbdr); color: var(--green); }
    .banner-red { background: var(--redbg); border: 1px solid var(--redbdr); color: var(--red); }
    .banner-blue { background: var(--bluebg); border: 1px solid var(--bluebdr); color: var(--blue); }
    .banner-pulse { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .banner-gold .banner-pulse { background: var(--gold); animation: ping 1.5s ease-out infinite; }
    .banner-green .banner-pulse { background: var(--green); animation: ping 1.5s ease-out infinite; }

    /* ══ KPI GRID ══ */
    .kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 18px; }
    .kpi-card {
      background: var(--bg2);
      border: 1px solid var(--b3);
      border-radius: var(--r16);
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .kpi-card:hover { border-color: var(--b2); }
    .kpi-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
    }
    .kc-gold::after { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .kc-green::after { background: linear-gradient(90deg, transparent, var(--green), transparent); }
    .kc-blue::after { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
    .kc-red::after { background: linear-gradient(90deg, transparent, var(--red), transparent); }
    .kc-purple::after { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
    .kpi-lbl {
      font-family: var(--font-mono);
      font-size: 8.5px;
      color: var(--t3);
      letter-spacing: .1em;
      margin-bottom: 10px;
    }
    .kpi-val {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.04em;
    }
    .kpi-sub { font-size: 10px; color: var(--t3); margin-top: 6px; }
    .kpi-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 9px;
      font-family: var(--font-mono);
      padding: 2px 7px;
      border-radius: var(--r4);
      margin-top: 8px;
    }
    .kb-gold { background: var(--goldbg); color: var(--gold2); border: 1px solid var(--goldbdr); }
    .kb-green { background: var(--greenbg); color: var(--green); border: 1px solid var(--greenbdr); }
    .kb-red { background: var(--redbg); color: var(--red); border: 1px solid var(--redbdr); }

    /* ══ CARD ══ */
    .card {
      background: var(--bg2);
      border: 1px solid var(--b3);
      border-radius: var(--r16);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--b3);
    }
    .card-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -.01em;
    }
    .card-meta { font-family: var(--font-mono); font-size: 10px; color: var(--t3); }
    .card-act { font-size: 11px; color: var(--gold2); cursor: pointer; font-weight: 500; }

    /* ══ TABLE ══ */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 9px 14px;
      font-family: var(--font-mono);
      font-size: 8.5px;
      color: var(--t4);
      letter-spacing: .1em;
      text-align: left;
      border-bottom: 1px solid var(--b3);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: var(--t2); }
    thead th.sorted { color: var(--gold2); }
    tbody tr {
      border-bottom: 1px solid var(--b3);
      cursor: pointer;
      transition: background .1s;
    }
    tbody tr:hover { background: var(--bg3); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 14px; vertical-align: middle; }
    .ev-flag { font-size: 16px; }
    .ev-name {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--t1);
      font-family: var(--font-head);
      letter-spacing: -.01em;
    }
    .ev-sub { font-size: 10px; color: var(--t3); margin-top: 2px; font-family: var(--font-mono); }
    .cat-tag {
      display: inline-block;
      font-size: 9px;
      font-family: var(--font-mono);
      font-weight: 500;
      padding: 2px 7px;
      border-radius: var(--r4);
      letter-spacing: .04em;
    }
    .ct-f1 { background: rgba(212,168,67,.1); color: var(--gold2); border: 1px solid var(--goldbdr); }
    .ct-mma { background: var(--redbg); color: var(--red); border: 1px solid var(--redbdr); }
    .ct-concert { background: var(--purplebg); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
    .ct-sport { background: var(--greenbg); color: var(--green); border: 1px solid var(--greenbdr); }
    .ct-custom { background: var(--bluebg); color: var(--blue); border: 1px solid var(--bluebdr); }
    .hdot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; margin-right: 5px; }
    .hn { background: var(--red); }
    .hm { background: var(--gold); }
    .hf { background: var(--green); }
    .mf { font-family: var(--font-mono); font-size: 11px; color: var(--t3); }
    .mr { font-family: var(--font-mono); font-size: 11.5px; font-weight: 500; color: var(--t1); }
    .mb {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: var(--r4);
      letter-spacing: .02em;
    }
    .mb-hot { background: var(--greenbg); color: var(--green); border: 1px solid var(--greenbdr); }
    .mb-mid { background: var(--goldbg); color: var(--gold2); border: 1px solid var(--goldbdr); }
    .mb-low { background: var(--bg4); color: var(--t3); border: 1px solid var(--b3); }
    .mb-drop { background: var(--redbg); color: var(--red); border: 1px solid var(--redbdr); }
    .live-badge {
      font-size: 8px;
      font-family: var(--font-mono);
      background: var(--greenbg);
      color: var(--green);
      border: 1px solid var(--greenbdr);
      padding: 1px 5px;
      border-radius: var(--r4);
      margin-left: 5px;
      vertical-align: middle;
    }
    .drop-badge {
      font-size: 8px;
      font-family: var(--font-mono);
      background: var(--redbg);
      color: var(--red);
      border: 1px solid var(--redbdr);
      padding: 1px 5px;
      border-radius: var(--r4);
      margin-left: 4px;
      vertical-align: middle;
    }
    .score-row { display: flex; align-items: center; gap: 7px; }
    .score-bar { width: 40px; height: 3px; background: var(--bg5); border-radius: 2px; }
    .score-fill { height: 100%; border-radius: 2px; }
    .score-n { font-family: var(--font-mono); font-size: 11px; min-width: 22px; }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 12px; opacity: .2; transition: opacity .15s; padding: 2px 5px; }
    .star-btn:hover, .star-btn.on { opacity: 1; }
    .plat-tag {
      font-size: 9.5px;
      font-family: var(--font-mono);
      color: var(--t3);
      background: var(--bg3);
      padding: 2px 7px;
      border-radius: var(--r4);
      border: 1px solid var(--b3);
    }

    /* ══ CHART ══ */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .chart-card {
      background: var(--bg2);
      border: 1px solid var(--b3);
      border-radius: var(--r16);
      padding: 18px 20px;
    }
    .chart-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; margin-bottom: 2px; letter-spacing: -.01em; }
    .chart-sub { font-family: var(--font-mono); font-size: 9.5px; color: var(--t3); margin-bottom: 14px; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--t3); }
    .leg-sq { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* ══ ALERTS ══ */
    .alert-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--b3);
      transition: background .1s;
    }
    .alert-row:hover { background: var(--bg3); }
    .alert-row:last-child { border-bottom: none; }
    .alert-icon {
      width: 32px; height: 32px;
      border-radius: var(--r8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .ai-gold { background: var(--goldbg); border: 1px solid var(--goldbdr); }
    .ai-green { background: var(--greenbg); border: 1px solid var(--greenbdr); }
    .ai-red { background: var(--redbg); border: 1px solid var(--redbdr); }
    .ai-blue { background: var(--bluebg); border: 1px solid var(--bluebdr); }
    .alert-name { font-size: 12.5px; font-weight: 600; font-family: var(--font-head); }
    .alert-desc { font-size: 10px; color: var(--t3); margin-top: 2px; font-family: var(--font-mono); }
    .alert-time { font-size: 9.5px; color: var(--t4); font-family: var(--font-mono); flex-shrink: 0; }

    /* ══ TOOLBAR ══ */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--b3);
      flex-wrap: wrap;
    }
    .fchip {
      font-size: 10.5px;
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid var(--b3);
      background: transparent;
      color: var(--t3);
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap;
      font-family: var(--font-mono);
    }
    .fchip:hover { border-color: var(--b4); color: var(--t2); }
    .fchip.on { border-color: var(--gold); background: var(--goldbg); color: var(--gold2); }
    .vsep { width: 1px; height: 16px; background: var(--b3); margin: 0 2px; flex-shrink: 0; }
    .search-box {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 5px 12px;
      transition: border-color .15s;
    }
    .search-box:focus-within { border-color: var(--b2); }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--t1);
      font-size: 12px;
      width: 140px;
      font-family: var(--font-body);
    }
    .search-box input::placeholder { color: var(--t4); }

    /* ══ KANBAN ══ */
    .kanban-board { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; padding: 18px; }
    .kanban-col {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r12);
      overflow: hidden;
      min-height: 300px;
    }
    .kanban-col-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--b3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kanban-col-title {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
    }
    .kanban-count {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 1px 6px;
      border-radius: var(--r4);
      background: var(--bg5);
      color: var(--t3);
    }
    .kanban-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 200px; }
    .kanban-card {
      background: var(--bg2);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 10px 12px;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      overflow: hidden;
    }
    .kanban-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
    }
    .kanban-card.kc-watch::before { background: var(--blue); }
    .kanban-card.kc-bought::before { background: var(--gold); }
    .kanban-card.kc-selling::before { background: var(--purple); }
    .kanban-card.kc-sold::before { background: var(--green); }
    .kanban-card:hover { border-color: var(--b2); transform: translateY(-1px); }
    .kc-name { font-size: 11.5px; font-weight: 600; font-family: var(--font-head); margin-bottom: 4px; }
    .kc-meta { font-size: 9.5px; color: var(--t3); font-family: var(--font-mono); }
    .kc-marge { font-family: var(--font-mono); font-size: 11px; font-weight: 600; margin-top: 6px; }
    .kc-actions { display: flex; gap: 4px; margin-top: 8px; }
    .kc-btn {
      flex: 1;
      padding: 4px 8px;
      border-radius: var(--r4);
      font-size: 9px;
      font-family: var(--font-mono);
      cursor: pointer;
      border: 1px solid var(--b3);
      background: var(--bg3);
      color: var(--t3);
      transition: all .15s;
    }
    .kc-btn:hover { border-color: var(--gold); color: var(--gold2); }
    .kc-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .kanban-empty {
      padding: 24px 14px;
      text-align: center;
      color: var(--t4);
      font-size: 11px;
      font-family: var(--font-mono);
    }

    /* ══ PRIX DROP ══ */
    .drop-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--b3);
    }
    .drop-row:last-child { border-bottom: none; }
    .drop-icon { font-size: 16px; flex-shrink: 0; }
    .drop-name { font-size: 12.5px; font-weight: 600; font-family: var(--font-head); }
    .drop-meta { font-size: 10px; color: var(--t3); font-family: var(--font-mono); margin-top: 2px; }
    .drop-pct {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--red);
      flex-shrink: 0;
    }
    .drop-action {
      background: var(--greenbg);
      border: 1px solid var(--greenbdr);
      border-radius: var(--r8);
      padding: 5px 12px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--green);
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
    }
    .drop-action:hover { background: var(--green); color: var(--bg0); }

    /* ══ FORM ══ */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1/-1; }
    .form-label { font-size: 9px; font-family: var(--font-mono); color: var(--t3); letter-spacing: .08em; }
    .form-input, .form-select {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 9px 13px;
      color: var(--t1);
      font-size: 12.5px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
      font-family: var(--font-body);
    }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-select option { background: var(--bg3); }
    .form-preview {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--t3);
      font-family: var(--font-mono);
      margin: 0 18px 4px;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      padding: 12px 18px;
      justify-content: flex-end;
      border-top: 1px solid var(--b3);
    }
    .btn-primary {
      background: var(--gold);
      color: var(--bg0);
      border: none;
      border-radius: var(--r8);
      padding: 9px 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-head);
      letter-spacing: .02em;
    }
    .btn-primary:hover { background: var(--gold2); }
    .btn-ghost {
      background: transparent;
      color: var(--t2);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 9px 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-body);
    }
    .btn-ghost:hover { border-color: var(--b4); color: var(--t1); }

    /* ══ ROI ══ */
    .roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
    .roi-fields { display: flex; flex-direction: column; gap: 12px; }
    .roi-field { display: grid; grid-template-columns: 140px 1fr 50px; align-items: center; gap: 10px; }
    .roi-lbl { font-size: 11px; color: var(--t3); font-family: var(--font-mono); }
    .roi-inp {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 9px 13px;
      color: var(--t1);
      font-size: 14px;
      font-family: var(--font-mono);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .roi-inp:focus { border-color: var(--gold); }
    .roi-unit { font-size: 11px; color: var(--t3); font-family: var(--font-mono); }
    .roi-result {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r12);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .roi-big {
      font-family: var(--font-head);
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.04em;
    }
    .roi-sublbl { font-size: 9.5px; color: var(--t3); font-family: var(--font-mono); letter-spacing: .08em; }
    .roi-bar { height: 6px; border-radius: 3px; background: var(--bg5); overflow: hidden; }
    .roi-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .4s; }
    .roi-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .roi-stat {
      background: var(--bg2);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 10px 12px;
    }
    .roi-stat-lbl { font-size: 8.5px; color: var(--t4); font-family: var(--font-mono); letter-spacing: .08em; margin-bottom: 5px; }
    .roi-stat-val { font-size: 15px; font-weight: 700; font-family: var(--font-mono); }

    /* ══ CURRENCY ══ */
    .curr-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 14px 18px; }
    .curr-card {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r12);
      padding: 14px 16px;
    }
    .curr-pair { font-size: 9px; color: var(--t3); font-family: var(--font-mono); margin-bottom: 6px; letter-spacing: .06em; }
    .curr-rate { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }
    .curr-conv-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-top: 1px solid var(--b3);
      flex-wrap: wrap;
    }
    .curr-inp {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 7px 12px;
      color: var(--t1);
      font-size: 14px;
      font-family: var(--font-mono);
      outline: none;
      width: 100px;
    }
    .curr-res-item {
      background: var(--bg4);
      border-radius: var(--r8);
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* ══ COMPARATOR ══ */
    .comp-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; padding: 16px 18px; }
    .comp-card {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r12);
      overflow: hidden;
      transition: border-color .2s;
    }
    .comp-card:hover { border-color: var(--b2); }
    .comp-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--b3);
    }
    .plat-logo {
      width: 28px; height: 28px;
      border-radius: var(--r8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--bg0);
      flex-shrink: 0;
      font-family: var(--font-mono);
    }
    .comp-plat-name { font-size: 12.5px; font-weight: 600; font-family: var(--font-head); }
    .comp-plat-sub { font-size: 9px; color: var(--t3); font-family: var(--font-mono); }
    .comp-badge { margin-left: auto; font-size: 8.5px; font-family: var(--font-mono); padding: 2px 7px; border-radius: var(--r4); }
    .comp-rows { padding: 6px 0; }
    .comp-row { display: flex; align-items: center; padding: 6px 16px; gap: 10px; }
    .comp-row-lbl { font-size: 10.5px; color: var(--t3); min-width: 80px; }
    .comp-row-bar { flex: 1; height: 3px; background: var(--bg5); border-radius: 2px; overflow: hidden; }
    .comp-row-fill { height: 100%; border-radius: 2px; transition: width .4s; }
    .comp-row-val { font-size: 11.5px; font-weight: 600; font-family: var(--font-mono); min-width: 55px; text-align: right; }
    .comp-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 16px; }
    .comp-pros, .comp-cons { border-radius: var(--r8); padding: 8px 10px; font-size: 9.5px; }
    .comp-pros { background: var(--greenbg); border: 1px solid var(--greenbdr); }
    .comp-cons { background: var(--redbg); border: 1px solid var(--redbdr); }
    .comp-pc-lbl { font-weight: 700; font-family: var(--font-mono); margin-bottom: 4px; font-size: 8.5px; letter-spacing: .06em; }
    .comp-pc-lbl.g { color: var(--green); }
    .comp-pc-lbl.r { color: var(--red); }
    .comp-pc-item { color: var(--t2); margin-top: 2px; }
    .comp-footer { font-size: 9px; color: var(--t4); font-family: var(--font-mono); padding: 7px 16px; border-top: 1px solid var(--b3); }

    /* ══ WATCHLIST ══ */
    .wl-inp-row { display: flex; gap: 8px; padding: 12px 18px; border-bottom: 1px solid var(--b3); }
    .wl-inp {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 7px 12px;
      color: var(--t1);
      font-size: 12.5px;
      outline: none;
      transition: border-color .15s;
      font-family: var(--font-body);
    }
    .wl-inp:focus { border-color: var(--gold); }
    .wl-add-btn {
      background: var(--gold);
      color: var(--bg0);
      border: none;
      border-radius: var(--r8);
      padding: 7px 14px;
      font-size: 11.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-head);
    }
    .wl-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--b3);
      transition: background .1s;
    }
    .wl-item:hover { background: var(--bg3); }
    .wl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .wl-name { font-size: 12.5px; font-weight: 600; flex: 1; font-family: var(--font-head); }
    .wl-meta { font-size: 9.5px; color: var(--t3); margin-top: 2px; font-family: var(--font-mono); }
    .wl-del {
      background: none;
      border: none;
      color: var(--t4);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: var(--r4);
      transition: all .15s;
    }
    .wl-del:hover { background: var(--redbg); color: var(--red); }

    /* ══ SETTINGS ══ */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 18px; }
    .setting-group { display: flex; flex-direction: column; gap: 5px; }
    .setting-group.full { grid-column: 1/-1; }
    .setting-label { font-size: 9px; font-family: var(--font-mono); color: var(--t3); letter-spacing: .08em; }
    .setting-input {
      background: var(--bg3);
      border: 1px solid var(--b3);
      border-radius: var(--r8);
      padding: 9px 13px;
      color: var(--t1);
      font-size: 11.5px;
      font-family: var(--font-mono);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .setting-input:focus { border-color: var(--gold); }
    .setting-desc { font-size: 9px; color: var(--t4); font-family: var(--font-mono); margin-top: 2px; }
    .btn-save {
      background: var(--gold);
      color: var(--bg0);
      border: none;
      border-radius: var(--r8);
      padding: 9px 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-head);
    }
    .btn-save:hover { background: var(--gold2); }

    /* ══ NOTIF PANEL ══ */
    .notif-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--b3);
    }
    .notif-icon {
      width: 38px; height: 38px;
      border-radius: var(--r8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .ni-ok { background: var(--greenbg); border: 1px solid var(--greenbdr); }
    .ni-off { background: var(--bg3); border: 1px solid var(--b3); }
    .notif-name { font-size: 12.5px; font-weight: 600; font-family: var(--font-head); }
    .notif-sub { font-size: 9.5px; color: var(--t3); font-family: var(--font-mono); margin-top: 2px; }
    .btn-notif {
      padding: 7px 14px;
      border-radius: var(--r8);
      font-size: 11.5px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: var(--font-head);
      transition: all .15s;
    }
    .btn-notif-on { background: var(--gold); color: var(--bg0); }
    .btn-notif-off { background: var(--redbg); color: var(--red); border: 1px solid var(--redbdr); }

    /* ══ CUSTOM EVENTS ══ */
    .cev-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--b3);
      transition: background .1s;
    }
    .cev-item:hover { background: var(--bg3); }
    .cev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cev-name { font-size: 12px; font-weight: 600; flex: 1; font-family: var(--font-head); }
    .cev-meta { font-size: 9.5px; color: var(--t3); font-family: var(--font-mono); margin-top: 2px; }
    .del-btn { background: none; border: none; color: var(--t4); cursor: pointer; font-size: 11px; padding: 3px 7px; border-radius: var(--r4); transition: all .15s; }
    .del-btn:hover { background: var(--redbg); color: var(--red); }

    /* ══ UTILS ══ */
    .empty { padding: 48px; text-align: center; color: var(--t4); }
    .empty-icon { font-size: 28px; margin-bottom: 12px; opacity: .3; }
    .empty-txt { font-family: var(--font-mono); font-size: 11px; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg4);
      border: 1px solid var(--b2);
      border-radius: var(--r12);
      padding: 10px 16px;
      font-size: 12.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: all .2s;
      pointer-events: none;
      max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ══ MOBILE ══ */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(10,10,15,.97);
      border-top: 1px solid var(--b1);
      padding: 6px 4px;
      padding-bottom: env(safe-area-inset-bottom, 6px);
      justify-content: space-around;
      align-items: center;
      backdrop-filter: blur(12px);
    }
    .mnav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 8px;
      border-radius: var(--r8);
      cursor: pointer;
      transition: all .15s;
      border: none;
      background: transparent;
      min-width: 44px;
    }
    .mnav-icon { font-size: 18px; line-height: 1; }
    .mnav-label { font-size: 8.5px; color: var(--t3); font-family: var(--font-mono); }
    .mnav-item.active .mnav-label { color: var(--gold2); }
    .mnav-item.active .mnav-icon { filter: drop-shadow(0 0 4px var(--gold)); }
    .back-btn {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: var(--r8);
      background: var(--bg3);
      border: 1px solid var(--b3);
      color: var(--t2);
      font-size: 11.5px;
      cursor: pointer;
      transition: all .15s;
    }
    .back-btn:hover { border-color: var(--gold); color: var(--gold2); }

    @media(max-width:640px) {
      .mobile-nav { display: flex; }
      .content { padding: 14px; padding-bottom: 80px; }
      .back-btn { display: flex; }
      .nav-center { display: none; }
      .kpi-grid { grid-template-columns: repeat(2,1fr); }
      .chart-grid, .roi-grid, .comp-grid, .kanban-board { grid-template-columns: 1fr; }
      .form-grid, .settings-grid { grid-template-columns: 1fr; }
      .roi-field { grid-template-columns: 110px 1fr 40px; }
    }
    @media(max-width:900px) {
      .kpi-grid { grid-template-columns: repeat(3,1fr); }
      .sidebar { display: none; }
    }
    @media(min-width:641px) { .mobile-nav { display: none !important; } }
  </style>
</head>
<body>

<div class="toast" id="toast"><span id="t-icon"></span><span id="t-msg"></span></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-mark">TR</div>
    <div class="logo-text">
      <div class="logo-name">TicketRadar</div>
      <div class="logo-tag">resale intelligence v5</div>
    </div>
  </div>
  <div class="nav-center">
    <div class="nav-pills">
      <button class="npill active" onclick="nav('dashboard',this)" id="nav-dashboard">Dashboard</button>
      <button class="npill" onclick="nav('events',this)" id="nav-events">Événements</button>
      <button class="npill" onclick="nav('kanban',this)" id="nav-kanban">Kanban</button>
      <button class="npill" onclick="nav('drops',this)" id="nav-drops">📉 Chutes</button>
      <button class="npill" onclick="nav('add',this)" id="nav-add">+ Ajouter</button>
      <button class="npill" onclick="nav('roi',this)" id="nav-roi">ROI</button>
      <button class="npill" onclick="nav('compare',this)" id="nav-compare">Compare</button>
      <button class="npill" onclick="nav('watchlist',this)" id="nav-watchlist">Watchlist</button>
      <button class="npill" onclick="nav('settings',this)" id="nav-settings">⚙</button>
    </div>
  </div>
  <div class="topbar-right">
    <button class="back-btn" id="back-btn" onclick="navBack()" style="display:none">← Back</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="lb-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="lb-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="status-dot" id="status-dot"></div>
    <span class="status-lbl" id="status-lbl">—</span>
    <button class="scan-btn" id="scan-btn" onclick="runScan()">
      <span class="scan-spin" id="scan-ic">⟳</span>
      <span id="scan-lbl">Scanner</span>
    </button>
  </div>
</div>

<div class="shell">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-lbl" id="sb-mkt-lbl">MARCHÉS</div>
      <div id="mkt-list"></div>
    </div>
    <div class="sb-section">
      <div class="sb-lbl" id="sb-seuil-lbl">SEUIL ALERTE</div>
      <div class="seuil-wrap">
        <div class="seuil-row">
          <span class="seuil-lbl" id="sb-min-lbl">marge min.</span>
          <span id="seuil-val">+30%</span>
        </div>
        <input type="range" min="10" max="200" step="5" value="30" id="seuil" oninput="onSeuil(this.value)">
        <div style="display:flex;justify-content:space-between;font-size:8.5px;color:var(--t4);font-family:var(--font-mono);margin-top:3px"><span>10%</span><span>200%</span></div>
      </div>
    </div>
    <div class="sb-section">

/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */
async function loadSheet() {
  if (!S.sheetUrl || S.sheetUrl === 'COLLE_ICI_L_URL_CSV_DE_TON_SHEET') {
    S.sheetLoaded = false;
    updateDataSourceInfo('not-configured');
    render();
    return;
  }
  S.loadingSheet = true;
  updateDataSourceInfo('loading');
  render();
  try {
    const res = await fetch(S.sheetUrl, { method: 'GET', cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rawText = await res.text();
    let events = [];
    const trimmed = rawText.trim();
    if (trimmed.startsWith('[') || trimmed.startsWith('{')) {
      const rows = JSON.parse(trimmed);
      const arr = Array.isArray(rows) ? rows : [rows];
      let nextId = 1000;
      events = arr.map(row => {
        const face = parseFloat(row.face) || 0;
        const resale = parseFloat(row.resale) || 0;
        const net = resale * 0.85;
        const marge = face > 0 ? Math.round(((net - face) / face) * 100) : 0;
        const score = parseFloat(row.score) || Math.min(Math.max(Math.round(marge/20+5),5),10);
        return {
          id: nextId++,
          name: String(row.name||''), sub: String(row.sub||''),
          date: String(row.date||''), h: String(row.horizon||row.h||'mid'),
          country: String(row.country||'FR'), flag: String(row.flag||'🎫'),
          cat: String(row.cat||'concert'), platform: String(row.platform||''),
          face, resale, marge, score,
          prevResale: resale, // Initialize prevResale same as resale
          starred: false, custom: false, live: false,
        };
      }).filter(e => e.name && e.face > 0);
    } else {
      events = parseSheetCSV(rawText);
    }
    if (!events.length) throw new Error('Sheet vide ou format incorrect');
    S.sheetEvents = events;
    S.sheetLoaded = true;
    S.sheetError = '';
    S.loadingSheet = false;
    updateDataSourceInfo('ok', events.length);
    if (S.apiUrl) await enrichWithLivePrices();
    toast(`✅ ${events.length} events chargés`, '📊');
    render();
  } catch (err) {
    S.sheetLoaded = false;
    S.sheetError = err.message;
    S.loadingSheet = false;
    updateDataSourceInfo('error', 0, err.message);
    toast('Erreur Sheet : ' + err.message, '⚠');
    render();
  }
}

function parseSheetCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitCSV(lines[0]).map(h => h.trim().replace(/"/g,'').toLowerCase());
  let nextId = 1000;
  return lines.slice(1).map(line => {
    const cols = splitCSV(line);
    const row = {};
    headers.forEach((h,i) => { row[h] = (cols[i]||'').replace(/"/g,'').trim(); });
    const face = parseFloat(row.face)||0;
    const resale = parseFloat(row.resale)||0;
    const net = resale*0.85;
    const marge = face > 0 ? Math.round(((net-face)/face)*100) : 0;
    const score = parseFloat(row.score)||Math.min(Math.max(Math.round(marge/20+5),5),10);
    return {
      id:nextId++, name:row.name||'', sub:row.sub||row.lieu||'',
      date:row.date||'', h:row.horizon||row.h||'mid',
      country:row.country||'FR', flag:row.flag||'🎫',
      cat:row.cat||row.category||'concert', platform:row.platform||'',
      face, resale, marge, score, prevResale:resale,
      starred:false, custom:false, live:false,
    };
  }).filter(e => e.name && e.face > 0);
}

function splitCSV(line) {
  const result = []; let current = ''; let inQ = false;
  for (const c of line) {
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { result.push(current); current = ''; }
    else current += c;
  }
  result.push(current);
  return result;
}

function updateDataSourceInfo(status, count=0, error='') {
  const el = document.getElementById('data-source-info');
  if (!el) return;
  const msgs = {
    'not-configured': '<span style="color:var(--gold2)">Non configuré<br>→ ⚙ Config</span>',
    'loading': '<span style="color:var(--blue)">⟳ Chargement...</span>',
    'ok': `<span style="color:var(--green)">✓ Connecté<br>${count} events</span>`,
    'error': `<span style="color:var(--red)">✕ ${error.slice(0,30)}</span>`,
  };
  el.innerHTML = msgs[status] || msgs['not-configured'];
}

/* ══════════════════════════════════════════════
   LIVE PRICES
══════════════════════════════════════════════ */
async function enrichWithLivePrices() {
  if (!S.apiUrl) return;
  try {
    const res = await fetch(S.apiUrl + '/prices');
    if (!res.ok) return;
    const data = await res.json();
    const prices = data.data || data;
    const evs = S.sheetLoaded ? S.sheetEvents : FALLBACK_EVENTS;
    for (const ev of evs) {
      const match = prices.find(p => {
        const key = p.event_key || '';
        return ev.name.toLowerCase().includes(key) || key.includes(ev.name.toLowerCase().split(' ')[0]);
      });
      if (match && match.resale_avg > 0) {
        ev.prevResale = ev.resale; // Store previous for drop detection
        ev.resale = match.resale_avg;
        const net = ev.resale * 0.85;
        ev.marge = ev.face > 0 ? Math.round(((net-ev.face)/ev.face)*100) : 0;
        ev.live = match.source === 'live';
      }
    }
    toast('Prix live mis à jour', '📡');
  } catch(err) { console.warn('Live prices error:', err); }
}

async function sendTelegramDirect(events, seuil) {

  let sent = 0;
  const hits = events.filter(e => e.marge >= seuil).sort((a,b)=>b.marge-a.marge).slice(0,5);

      const r = await fetch('https://api.telegram.org/bot'+S.tgToken+'/sendMessage', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:S.tgChatId, text:msg})
      });
      if ((await r.json()).ok) sent++;
    } catch(e) {}
  }
  // Also alert price drops
  const drops = events.filter(e => hasDrop(e) && dropPct(e) <= -5).slice(0,2);
  for (const ev of drops) {
    try {
      const pct = dropPct(ev);
      const msg = '📉 TicketRadar v5 — Chute de prix !\n\n' + (ev.flag||'🎫') + ' ' + ev.name + '\n📉 Baisse : ' + pct + '%\n💰 Ancien prix : ' + ev.prevResale + '€ → Maintenant : ' + ev.resale + '€\n⚡ BON MOMENT D\'ACHETER\n\n👉 https://fredericnjoh-lab.github.io/ticketradar/';
      const r = await fetch('https://api.telegram.org/bot'+S.tgToken+'/sendMessage', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:S.tgChatId, text:msg})
      });
      if ((await r.json()).ok) sent++;
    } catch(e) {}
  }
  return sent;
}

}

function addToKanban(evId, col) {
  const ev = allEvs().find(e => e.id === evId);
  if (!ev) return;
  // Check not already in kanban
  const allKanbanIds = Object.values(S.kanban).flat().map(k => k.id);
  if (allKanbanIds.includes(evId)) { toast(S.lang==='fr'?'Déjà dans le Kanban':'Already in Kanban','ℹ'); return; }
  S.kanban[col].push({
    id: evId, name: ev.name, flag: ev.flag||'🎫',
    face: ev.face, resale: ev.resale, marge: ev.marge,
    platform: ev.platform, date: ev.date, cat: ev.cat,
    addedAt: new Date().toLocaleDateString('fr-FR'),
    notes: ''
  });
  saveState();
  toast(S.lang==='fr'?`"${ev.name}" ajouté au Kanban`:`"${ev.name}" added to Kanban`,'🗂️');
  render();
}

function moveKanban(evId, fromCol, toCol) {
  const idx = S.kanban[fromCol].findIndex(k => k.id === evId);
  if (idx === -1) return;
  const item = S.kanban[fromCol].splice(idx, 1)[0];
  if (toCol) S.kanban[toCol].push(item);
  saveState();
  render();
}

function calcKanbanPnL() {
  const bought  = [...S.kanban.bought, ...S.kanban.selling, ...S.kanban.sold];
  const selling = S.kanban.selling;
  const sold    = S.kanban.sold;
  const totalInvested = bought.reduce((s,k)  => s + (k.face   * (k.qty||1)), 0);
  const expectedGain  = selling.reduce((s,k) => s + ((k.resale * 0.85 - k.face) * (k.qty||1)), 0);
  const realizedGain  = sold.reduce((s,k)    => s + ((k.soldPrice||k.resale) * 0.85 - k.face) * (k.qty||1), 0);
  const totalROI      = totalInvested > 0 ? Math.round(((expectedGain + realizedGain) / totalInvested) * 100) : 0;
  const totalItems    = Object.values(S.kanban).flat().length;
  return { totalInvested, expectedGain, realizedGain, totalROI, totalItems };
}

function render() {
  // Status bar
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-lbl');
  if (S.loadingSheet) { dot.style.background='var(--gold)'; lbl.textContent='chargement...'; }
  else if (S.sheetLoaded) { dot.style.background='var(--green)'; lbl.textContent='sheet ✓'; }
  else { dot.style.background='var(--t4)'; lbl.textContent='local'; }

  // TG sidebar
  const tgEl = document.getElementById('tg-sidebar');
  if (tgEl) tgEl.innerHTML = S.tgToken
    ? '<span style="color:var(--green)">✓ Configuré</span>'
    : '<span style="color:var(--t3)">Non configuré</span>';

  const c = document.getElementById('content');
  if (S.view === 'dashboard') renderDash(c);
  else if (S.view === 'events') renderEvents(c);
  else if (S.view === 'kanban') renderKanban(c);
  else if (S.view === 'drops') renderDrops(c);
  else if (S.view === 'add') renderAdd(c);
  else if (S.view === 'roi') renderROI(c);
  else if (S.view === 'compare') renderCompare(c);
  else if (S.view === 'watchlist') renderWatchlist(c);
  else if (S.view === 'settings') renderSettings(c);
}

function calcPreview() {
  const face = parseFloat(document.getElementById('f-face')?.value)||0;
  const resale = parseFloat(document.getElementById('f-resale')?.value)||0;
  const qty = parseInt(document.getElementById('f-qty')?.value)||1;
  const el = document.getElementById('form-preview');
  if (!el||!face||!resale) return;
  const net = resale*.85;
  const marge = Math.round(((net-face)/face)*100);
  const gain = Math.round((net-face)*qty);
  const col = marge>=100?'var(--green)':marge>=50?'var(--gold2)':'var(--t3)';
  el.innerHTML = `Marge : <span style="color:${col};font-weight:600">+${marge}%</span> · Gain net ×${qty} : <span style="color:${col};font-weight:600">${gain>=0?'+':''}${gain}€</span> · Investi : ${face*qty}€`;
}

function saveEvent() {
  const name = document.getElementById('f-name').value.trim();
  const face = parseFloat(document.getElementById('f-face').value)||0;
  const resale = parseFloat(document.getElementById('f-resale').value)||0;
  if (!name||!face||!resale) { toast(S.lang==='fr'?'Renseignez nom, face et revente':'Enter name, face and resale','⚠'); return; }
  const net = resale*.85;
  const marge = Math.round(((net-face)/face)*100);
  S.customEvents.push({
    id:S.nextId++, name, sub:document.getElementById('f-lieu').value||'',
    date:document.getElementById('f-date').value||'',
    flag:document.getElementById('f-flag').value||'🎫',
    cat:document.getElementById('f-cat').value,
    h:document.getElementById('f-h').value,
    platform:document.getElementById('f-platform').value,
    face, resale, marge, prevResale:resale,
    score:Math.min(Math.max(Math.round(marge/20+5),5),10),
    qty:parseInt(document.getElementById('f-qty').value)||1,
    notes:document.getElementById('f-notes').value,
    starred:false, custom:true, live:false, country:'CUSTOM',
  });
  saveState();
  toast(S.lang==='fr'?'Event enregistré !':'Event saved!','✓');
  resetForm();
  render();
}

function resetForm() {
  ['f-name','f-date','f-lieu','f-flag','f-notes','f-face','f-resale'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const q=document.getElementById('f-qty'); if(q) q.value='2';
  const p=document.getElementById('form-preview'); if(p) p.textContent=S.lang==='fr'?'Renseignez les prix pour la prévisualisation...':'Enter prices to preview...';
}

function deleteCustom(i) { S.customEvents.splice(i,1); saveState(); render(); }

function calcROI() {
  const fr = S.lang === 'fr';
  const face = parseFloat(document.getElementById('ri-0')?.value)||0;
  const resale = parseFloat(document.getElementById('ri-1')?.value)||0;
  const fees = parseFloat(document.getElementById('ri-2')?.value)||15;
  const qty = parseInt(document.getElementById('ri-3')?.value)||1;
  const transport = parseFloat(document.getElementById('ri-4')?.value)||0;
  const other = parseFloat(document.getElementById('ri-5')?.value)||0;
  const el = document.getElementById('roi-res'); if (!el) return;
  const net = resale*(1-fees/100);
  const grossGain = (net-face)*qty;
  const invest = (face*qty)+transport+other;
  const netGain = grossGain-transport-other;
  const roi = invest>0 ? Math.round((netGain/invest)*100) : 0;
  const breakeven = qty>0 ? Math.round(invest/qty) : 0;
  const margeNet = face>0 ? Math.round(((net-face)/face)*100) : 0;
  const col = roi>=100?'var(--green)':roi>=50?'var(--gold2)':roi<0?'var(--red)':'var(--t3)';
  const lbl = fr
    ? ['Investi total','Gain brut','Gain net','Marge nette','Break-even/billet']
    : ['Total invested','Gross gain','Net gain','Net margin','Break-even/ticket'];
  el.innerHTML = `
    <div class="roi-big" style="color:${col}">${roi>=0?'+':''}${roi}%</div>
    <div class="roi-sublbl">${fr?'ROI NET TOTAL':'TOTAL NET ROI'}</div>
    <div class="roi-bar"><div class="roi-bar-fill" style="width:${Math.min(Math.max(roi,0)/2,100)}%;background:${col}"></div></div>
    <div class="roi-stats">
      <div class="roi-stat"><div class="roi-stat-lbl">${lbl[0]}</div><div class="roi-stat-val">${Math.round(invest)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${lbl[1]}</div><div class="roi-stat-val" style="color:${grossGain>=0?'var(--green)':'var(--red)'}">${grossGain>=0?'+':''}${Math.round(grossGain)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${lbl[2]}</div><div class="roi-stat-val" style="color:${col}">${netGain>=0?'+':''}${Math.round(netGain)}€</div></div>
      <div class="roi-stat"><div class="roi-stat-lbl">${lbl[3]}</div><div class="roi-stat-val" style="color:${col}">${margeNet>=0?'+':''}${margeNet}%</div></div>
    </div>
    <div class="roi-stat"><div class="roi-stat-lbl">${lbl[4]}</div><div class="roi-stat-val">${breakeven}€</div></div>
    ${roi<0?`<div style="margin-top:8px;font-size:10px;color:var(--red);font-family:var(--font-mono)">⚠ ROI négatif</div>`:''}
    ${roi>=100?`<div style="margin-top:8px;font-size:10px;color:var(--green);font-family:var(--font-mono)">✓ Excellente rentabilité</div>`:''}`;
}

function calcCurr() {
  const amt = parseFloat(document.getElementById('curr-amt')?.value)||0;
  const from = document.getElementById('curr-from')?.value||'EUR';
  const el = document.getElementById('curr-res'); if (!el) return;
  const pairs = from==='EUR'?[['USD','$',FX.EUR_USD],['GBP','£',FX.EUR_GBP]]:from==='USD'?[['EUR','€',FX.USD_EUR],['GBP','£',FX.USD_GBP]]:[['EUR','€',FX.GBP_EUR],['USD','$',FX.GBP_USD]];
  el.innerHTML = pairs.map(([to,sym,rate]) => `<div class="curr-res-item"><strong>${sym}${(amt*rate).toFixed(2)}</strong> <span style="font-size:9px;color:var(--t3)">${to}</span></div>`).join('');
}

              <div class="comp-pc-lbl g">${fr?'AVANTAGES':'PROS'}</div>
              ${p.pros.map(x=>`<div class="comp-pc-item">· ${x}</div>`).join('')}
            </div>
            <div class="comp-cons">
              <div class="comp-pc-lbl r">${fr?'INCONVÉNIENTS':'CONS'}</div>
              ${p.cons.map(x=>`<div class="comp-pc-item">· ${x}</div>`).join('')}
            </div>
          </div>
          <div class="comp-footer">${fr?'Frais indicatifs · vérifiez les CGU':'Indicative fees · check T&Cs'}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderWatchlist(c) {
  const fr = S.lang === 'fr';
  const all = allEvs();
  c.innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Watchlist</span>
        <span class="card-meta">${S.wl.length} events</span>
      </div>
      <div class="wl-inp-row">
        <input class="wl-inp" id="wl-inp" placeholder="${fr?'Ajouter un event...':'Add an event...'}" onkeydown="if(event.key==='Enter')addWl()">
        <button class="wl-add-btn" onclick="addWl()">+ ${fr?'Ajouter':'Add'}</button>
      </div>
      ${S.wl.length===0
        ? `<div class="empty"><div class="empty-icon">◎</div><div class="empty-txt">${fr?'Watchlist vide':'Empty watchlist'}</div></div>`
        : S.wl.map((w,i) => {
          const m = all.find(e => e.name.toLowerCase().includes(w.toLowerCase().split(' ')[0]));
          return `<div class="wl-item">
            <div class="wl-dot" style="background:${m?sc(m.score):'var(--t4)'}"></div>
            <div style="flex:1">
              <div class="wl-name">${w}</div>
              ${m?`<div class="wl-meta">${m.flag||'🎫'} ${m.date} · +${m.marge}% · ${m.platform}${m.live?' · 📡':''}</div>`:'<div class="wl-meta">—</div>'}
            </div>
            ${m?`<span class="mb ${mc(m.marge)}" style="margin-right:8px">+${m.marge}%</span>`:''}
            <button class="wl-del" onclick="S.wl.splice(${i},1);saveState();render()">✕</button>
          </div>`;
        }).join('')
      }
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">Favoris ★</span>
      </div>
      ${buildTable(all.filter(e=>e.starred))}
    </div>`;
}

function addWl() {
  const v = document.getElementById('wl-inp').value.trim();
  if (v && !S.wl.includes(v)) { S.wl.push(v); saveState(); toast('"'+v+'" ajouté à la watchlist','★'); }
  render();
}

function saveTgConfig() {
  const t = document.getElementById('tg-token-input')?.value.trim();
  const c = document.getElementById('tg-chatid-input')?.value.trim();
  if (t) S.tgToken = t;
  if (c) S.tgChatId = c;
  saveState();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(reg => {
      if (reg.active) reg.active.postMessage({type:'CONFIG',payload:{sheetUrl:S.sheetUrl,seuil:S.seuil,tgToken:S.tgToken,tgChatId:S.tgChatId}});
    });
  }
  toast(S.lang==='fr'?'Telegram sauvegardé ✓ — Auto-scan actif !':'Telegram saved ✓ — Auto-scan active!','📱');
}

async function testTgDirect() {
  const token = document.getElementById('tg-token-input')?.value.trim()||S.tgToken;
  const chatid = document.getElementById('tg-chatid-input')?.value.trim()||S.tgChatId;
  if (!token||!chatid) { toast('Renseigne token et chat ID','⚠'); return; }
  try {
    const r = await fetch('https://api.telegram.org/bot'+token+'/sendMessage', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:chatid, text:'🧪 TicketRadar v5 — Test OK ! 🎫'})
    });
    const d = await r.json();
    if (d.ok) toast('✓ Message Telegram reçu !','📱');
    else toast('Erreur : '+d.description,'⚠');
  } catch(e) { toast('Erreur : '+e.message,'⚠'); }
}

function saveSheetUrl() {
  const input = document.getElementById('sheet-url-input');
  if (input) { S.sheetUrl = input.value.trim(); saveState(); loadSheet(); }
}

function saveApiUrl() {
  const input = document.getElementById('api-url-input');
  if (input) { S.apiUrl = input.value.trim(); saveState(); toast(S.lang==='fr'?'API sauvegardée':'API saved','✓'); render(); }
}

async function testApi() {
  if (!S.apiUrl) return;
  try {
    const res = await fetch(S.apiUrl+'/health');
    const d = await res.json();
    toast('API OK — '+d.status,'✓');
  } catch(e) { toast('API non joignable','✕'); }
}

/* ══════════════════════════════════════════════
   PLATFORM LINKS
══════════════════════════════════════════════ */
function getPlatformUrl(ev) {
  const name = (ev.name || '').replace(/–|—|-/g, ' ').replace(/\s+/g,' ').trim();
  const q = encodeURIComponent(name);
  const platform = (ev.platform || '').toLowerCase();
  if (platform.includes('viagogo'))      return 'https://www.viagogo.com/ww/Search?q=' + q;
  if (platform.includes('seatgeek'))     return 'https://seatgeek.com/search?q=' + q;
  if (platform.includes('ticketmaster') && platform.includes('fr')) return 'https://www.ticketmaster.fr/recherche?q=' + q;
  if (platform.includes('ticketmaster')) return 'https://www.ticketmaster.com/search?q=' + q;
  if (platform.includes('fnac'))         return 'https://www.fnacspectacles.com/search?query=' + q;
  if (platform.includes('ticketswap'))   return 'https://www.ticketswap.fr/search#' + q;
  if (platform.includes('stubhub') && platform.includes('uk')) return 'https://www.stubhub.co.uk/search?q=' + q;
  return 'https://www.stubhub.com/search?q=' + q;
}

function openPlatform(evId) {
  // Prevent double calls
  if (window._openPlatformLock) return;
  window._openPlatformLock = true;
  setTimeout(() => { window._openPlatformLock = false; }, 500);
  
  const ev = allEvs().find(e => e.id === evId);
  if (!ev) return;
  const url = getPlatformUrl(ev);
  // Only take the first URL if somehow concatenated
  const firstUrl = url.indexOf('https://', 8) > 0
    ? url.substring(0, url.indexOf('https://', 8))
    : url;
  window.open(firstUrl, '_blank', 'noopener,noreferrer');
}

function copyEventSummary(evId) {
  const ev = allEvs().find(e => e.id === evId);
  if (!ev) return;
  const txt = `${ev.flag||'🎫'} ${ev.name} · +${ev.marge}% · ${ev.face}€→${ev.resale}€ · ${ev.platform} · ${ev.date||''}`;
  navigator.clipboard.writeText(txt).then(() => toast(S.lang==='fr'?'Copié !':'Copied!', '📋'));
}

async function runScan() {
  const btn=document.getElementById('scan-btn'),lbl=document.getElementById('scan-lbl'),ic=document.getElementById('scan-ic');
  btn.classList.add('loading');
  lbl.textContent = S.lang==='fr'?'Scan...':'Scanning...';
  const frames=['⟳','↻','⟲']; let i=0;
  const anim = setInterval(()=>{ic.textContent=frames[i++%3];},300);
  await loadSheet();
  if (S.apiUrl) await enrichWithLivePrices();
  const tgSent = await sendTelegramDirect(allEvs(), S.seuil);
  clearInterval(anim);
  btn.classList.remove('loading');
  lbl.textContent = S.lang==='fr'?'Scanner':'Scan now';
  ic.textContent = '⟳';
  const opp = filtered().length;
  toast((S.lang==='fr'?'Scan terminé — ':'Scan done — ')+opp+(S.lang==='fr'?' opportunités':' opportunities')+(tgSent>0?` · 📱 ${tgSent} alertes`:''),'✓');
  render();
}
