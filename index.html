<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- CSP géré par GitHub Pages -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TicketRadar — Resale Intelligence v5</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4A843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TicketRadar">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- App styles -->
  <link rel="stylesheet" href="./styles.v6.css">
</head>
<body>

<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-mark">TR</div>
      <span class="topbar-brand">TicketRadar</span>
    </div>
    <div class="topbar-kpis">
      <div class="tb-kpi">
        <div class="tb-kpi-lbl">Live Scans</div>
        <div class="tb-kpi-val" id="tb-scans" style="color:var(--t1)">—</div>
      </div>
      <div class="tb-kpi">
        <div class="tb-kpi-lbl">Opportunities</div>
        <div class="tb-kpi-val" id="tb-opps" style="color:var(--t1)">—</div>
      </div>
      <div class="tb-kpi">
        <div class="tb-kpi-lbl">AVG ROI</div>
        <div class="tb-kpi-val" id="tb-roi" style="color:var(--teal)">—</div>
      </div>
    </div>
    <div class="topbar-search">
      <svg width="12" height="12" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5" fill="none" stroke="var(--t3)" stroke-width="1.5"/><line x1="11" y1="11" x2="15" y2="15" stroke="var(--t3)" stroke-width="1.5"/></svg>
      <input placeholder="Search..." id="topbar-search-input" oninput="S.search=this.value;if(S.view==='events')render()">
    </div>
    <div class="topbar-actions">
      <div class="tb-notif" title="Alertes">🔔<div class="tb-notif-dot" id="notif-dot" style="display:none"></div></div>
      <button id="user-btn" onclick="toggleUserMenu()" title="Mon compte">👤</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-section-lbl">Navigation</div>
    <div class="sb-item on" id="nav-dashboard" onclick="nav('dashboard',this)"><span class="sb-item-icon">📊</span> Dashboard</div>
    <div class="sb-item" id="nav-events" onclick="nav('events',this)"><span class="sb-item-icon">🎫</span> Events</div>
    <div class="sb-item" id="nav-kanban" onclick="nav('kanban',this)"><span class="sb-item-icon">💼</span> Kanban P&L</div>
    <div class="sb-item" id="nav-presale" onclick="nav('presale',this)"><span class="sb-item-icon">🔑</span> Presales</div>
    <div class="sb-section-lbl">Intelligence</div>
    <div class="sb-item" id="nav-ai" onclick="nav('ai',this)"><span class="sb-item-icon">🤖</span> AI Predictor</div>
    <div class="sb-item" id="nav-history" onclick="nav('history',this)"><span class="sb-item-icon">📈</span> Price History</div>
    <div class="sb-item" id="nav-map" onclick="nav('map',this)"><span class="sb-item-icon">🗺️</span> Map</div>
    <div class="sb-section-lbl">Compte</div>
    <div class="sb-item" id="nav-watchlist" onclick="nav('watchlist',this)"><span class="sb-item-icon">⭐</span> Watchlist</div>
    <div class="sb-item" id="nav-config" onclick="nav('config',this)"><span class="sb-item-icon">⚙️</span> Config</div>
    <div class="sb-bottom">
      <div class="sb-user" id="sb-user-area">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <div>
          <div class="sb-uname" id="sb-uname">Non connecté</div>
          <div class="sb-ustatus" id="sb-status">● offline</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div class="nav-pills" id="nav-pills">
      <button class="npill on" onclick="nav('dashboard',this)" id="mob-dashboard">📊</button>
      <button class="npill" onclick="nav('events',this)" id="mob-events">🎫 Events</button>
      <button class="npill" onclick="nav('kanban',this)" id="mob-kanban">💼 Kanban</button>
      <button class="npill" onclick="nav('presale',this)" id="mob-presale">🔑 Presale</button>
      <button class="npill" onclick="nav('ai',this)" id="mob-ai">🤖 IA</button>
      <button class="npill" onclick="nav('history',this)" id="mob-history">📈 Prix</button>
      <button class="npill" onclick="nav('map',this)" id="mob-map">🗺️ Carte</button>
      <button class="npill" onclick="nav('config',this)" id="mob-config">⚙️ Config</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- USER MENU -->
<div id="user-menu" style="display:none;position:fixed;top:58px;right:16px;z-index:500;padding:12px;min-width:200px">
  <div id="user-email" style="font-family:var(--font-mono);font-size:10px;color:var(--t3);margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--b1)"></div>
  <button onclick="doSignOut()" style="width:100%;background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r8);padding:10px;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body)">👋 Se déconnecter</button>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- AUTH MODAL -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(5,5,10,.92)">
  <div style="background:var(--bg2);border:1px solid var(--b3);border-radius:var(--r16);padding:32px;width:360px;max-width:90vw">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:48px;height:48px;background:var(--teal);border-radius:var(--r12);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:var(--bg0);margin:0 auto 12px">TR</div>
      <div style="font-size:20px;font-weight:800;letter-spacing:-.03em;color:var(--t1)">TicketRadar</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--t3);margin-top:4px" id="auth-subtitle">Connecte-toi pour sauvegarder tes données</div>
    </div>
    <div style="display:flex;gap:4px;background:var(--bg3);border-radius:var(--r8);padding:3px;margin-bottom:20px">
      <button id="tab-signin" onclick="switchAuthTab('signin')" style="flex:1;padding:7px;border-radius:6px;border:none;background:var(--bg5);color:var(--gold2);font-size:12px;font-weight:700;cursor:pointer">Connexion</button>
      <button id="tab-signup" onclick="switchAuthTab('signup')" style="flex:1;padding:7px;border-radius:6px;border:none;background:transparent;color:var(--t3);font-size:12px;cursor:pointer">Inscription</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input id="auth-email" type="email" placeholder="ton@email.com" style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r8);padding:11px 14px;color:var(--t1);font-size:13px;outline:none;width:100%;box-sizing:border-box" onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
      <div style="position:relative">
        <input id="auth-password" type="password" placeholder="Mot de passe" style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r8);padding:11px 40px 11px 14px;color:var(--t1);font-size:13px;outline:none;width:100%;box-sizing:border-box" onkeydown="if(event.key==='Enter')submitAuth()">
        <button onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--t3)" id="pwd-eye">👁</button>
      </div>
      <div id="auth-error" style="font-size:11px;color:var(--red);display:none;padding:8px 12px;background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r8)"></div>
      <button onclick="submitAuth()" id="auth-submit-btn" style="background:var(--teal);color:var(--bg0);border:none;border-radius:var(--r8);padding:13px;font-size:13px;font-weight:700;cursor:pointer;width:100%">Se connecter</button>
      <button onclick="skipAuth()" style="background:var(--bg3);color:var(--t2);border:1px solid var(--b1);border-radius:var(--r8);padding:11px;font-size:12px;cursor:pointer;width:100%">Continuer sans compte</button>
    </div>
    <div id="auth-success" style="display:none;text-align:center;padding:16px;color:var(--teal);font-size:12px"></div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Config -->
<script src="./config.js"></script>
<!-- App logic (defines S and all functions) -->
<script src="./app.v7.js"></script>
<!-- Supabase client (loads after S is defined) -->
<script src="./supabase.js"></script>
</body>
</html>
